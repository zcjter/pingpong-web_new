<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球比赛管理系统?v=6</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body, 'Lato', sans-serif);
            background: #e8f0fb;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #0057a8 0%, #0077b6 50%, #0096c7 100%);
            color: white;
            padding: 24px 40px;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .header h1 {
            font-size: 28px;
        }

        .nav {
            background: #1a1a2e;
            padding: 12px 40px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .nav-item {
            display: inline-block;
            padding: 10px 18px;
            cursor: pointer;
            color: rgba(255, 255, 255, .75);
            font-family: var(--font-header);
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            transition: all .25s;
        }

        .nav-item:hover {
            color: #ffd700;
            background: rgba(255, 255, 255, .08);
        }

        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, .12);
            box-shadow: inset 0 -2px 0 0 rgba(255, 215, 0, .5);
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .card {
            background: #fff;
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 22px;
            box-shadow: var(--shadow);
            color: #1c2a3a;
        }

        .card-title {
            font-family: var(--font-header);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #0b1c2b;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .ranking-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .ranking-table tr:hover {
            background: #f8f9fa;
        }

        .rank-num {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border-radius: 50%;
            background: #eee;
            font-weight: bold;
        }

        .rank-1 .rank-num {
            background: #ffd700;
            color: white;
        }

        .rank-2 .rank-num {
            background: #c0c0c0;
            color: white;
        }

        .rank-3 .rank-num {
            background: #cd7f32;
            color: white;
        }

        .points {
            color: #1a73e8;
            font-weight: bold;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-primary {
            background: #1a73e8;
            color: white;
        }

        .btn-success {
            background: #34a853;
            color: white;
        }

        .btn-danger {
            background: #ea4335;
            color: white;
        }

        .btn-warning {
            background: #fbbc04;
            color: white;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 25px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 18px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .announcement-item {
            padding: 15px;
            border-left: 4px solid #1a73e8;
            background: #f8f9fa;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .announcement-item:hover {
            background: #e8f0fe;
            transform: translateX(5px);
        }

        .announcement-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .announcement-date {
            font-size: 12px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 300px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .competition-card {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .competition-card:hover {
            background: #f8f9fa;
            border-color: #1a73e8;
        }

        .competition-info h4 {
            margin-bottom: 5px;
        }

        .competition-info p {
            font-size: 12px;
            color: #666;
            margin: 0;
        }

        .player-card {
            display: inline-block;
            width: 200px;
            padding: 15px;
            margin: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .player-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .player-card-actions {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .player-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1a73e8;
            color: white;
            line-height: 80px;
            font-size: 32px;
            margin: 0 auto 10px;
        }

        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-country {
            font-size: 12px;
            color: #666;
        }

        .player-detail-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .player-detail-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1a73e8;
            color: white;
            line-height: 100px;
            font-size: 48px;
            margin-right: 20px;
        }

        #detail-intro {
            margin-top: 10px;
            line-height: 1.6;
            color: #333;
        }

        #detail-intro h1,
        #detail-intro h2,
        #detail-intro h3 {
            margin: 10px 0 5px;
            color: #1a73e8;
        }

        #detail-intro p {
            margin: 8px 0;
        }

        #detail-intro ul,
        #detail-intro ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        #detail-intro code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        #detail-intro blockquote {
            border-left: 3px solid #1a73e8;
            padding-left: 10px;
            margin: 10px 0;
            color: #666;
        }

        .player-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1a73e8;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .back-btn {
            cursor: pointer;
            color: #1a73e8;
            margin-bottom: 15px;
            display: inline-block;
        }

        .announcement-detail {
            padding: 20px;
        }

        .announcement-content {
            line-height: 1.8;
            margin: 20px 0;
            white-space: pre-wrap;
        }

        .announcement-meta {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .score-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .score-table th,
        .score-table td {
            padding: 8px;
            text-align: center;
            border: 1px solid #eee;
        }

        .score-table th {
            background: #f8f9fa;
        }

        .score-table .winner {
            color: #34a853;
            font-weight: bold;
            background: #e8f5e9;
        }

        .score-table .loser {
            color: #999;
        }

        .game-scores {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .game-score {
            padding: 2px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
        }

        .link-btn {
            background: none;
            border: none;
            color: #1a73e8;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
        }

        .link-btn:hover {
            color: #1557b0;
        }

        /* ===== NEW DESIGN TOKENS AND COMPONENT STYLES ===== */
        :root {
            --color-bg: #e8f0fb;
            --color-card: #ffffff;
            --color-primary: #1a1a2e;
            --color-accent: #ffd700;
            --color-blue: #0077b6;
            --color-dark: #1a1a2e;
            --radius: 14px;
            --shadow: 0 4px 20px rgba(0, 0, 0, .08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, .06);
            --font-header: 'Poppins', sans-serif;
            --font-body: 'Lato', sans-serif;
        }

        .score-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .score-input-row input {
            width: 60px;
            text-align: center;
        }

        .score-input-row span {
            font-weight: bold;
        }

        /* =====================================================
           MATCH ROUND INFO STYLES (参考图2风格)
           ===================================================== */
        .rounds-wrap {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 12px;
        }

        .round-cat {
            margin-bottom: 20px;
        }

        .round-cat-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 2px solid #0077b6;
            display: inline-block;
        }

        .round-section {
            margin-bottom: 14px;
        }

        .round-section.is-group {
            border: 2px solid #cce5ff;
            border-radius: 10px;
            padding: 10px 12px;
            background: #f8fbff;
            margin-bottom: 18px;
        }

        .round-header {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: #0077b6;
            background: #e3f2fd;
            border-left: 3px solid #0077b6;
            padding: 5px 10px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 8px;
        }

        .round-header-dot {
            width: 6px;
            height: 6px;
            background: #0077b6;
            border-radius: 50%;
        }

        .round-table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
        }

        .round-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        .round-table thead th {
            background: #0077b6;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 9px 12px;
            text-align: center;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .round-table thead th:first-child {
            border-radius: 8px 0 0 0;
        }

        .round-table thead th:last-child {
            border-radius: 0 8px 0 0;
        }

        .round-row td {
            padding: 9px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 12px;
            color: #333;
            text-align: center;
            vertical-align: middle;
        }

        .round-row:last-child td {
            border-bottom: none;
        }

        .round-row:nth-child(even) td {
            background: #fafcff;
        }

        .round-row--winner td {
            background: transparent !important;
        }

        .rt-player {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: flex-start;
            min-width: 0;
        }

        .rt-player span:not(.rt-flag) {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .rt-flag img {
            width: 20px;
            height: 14px;
            border-radius: 2px;
            vertical-align: middle;
            background: #e3f2fd;
            padding: 1px;
        }

        .rt-name--win {
            font-weight: 700;
            color: #43a047;
        }

        .rt-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            flex-wrap: wrap;
        }

        .rs-game {
            display: inline-block;
            font-size: 10px;
            padding: 1px 4px;
            background: #e8e8e8;
            border-radius: 4px;
            color: #555;
            margin: 0 1px;
        }

        .rt-total {
            font-size: 14px;
            font-weight: 800;
            color: #b0bec5;
            min-width: 14px;
            display: inline-block;
            text-align: center;
        }

        .rt-total--win {
            color: #43a047;
        }

        .rt-sep {
            font-weight: 800;
            color: #ccc;
            margin: 0 2px;
            font-size: 14px;
        }

        .rt-venue {
            font-size: 11px;
        }

        .rt-status-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .rt-status--completed {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .rt-status--ongoing {
            background: #fff8e1;
            color: #f57f17;
        }

        .rt-status--scheduled {
            background: #e3f2fd;
            color: #1565c0;
        }

        .rt-status--cancelled {
            background: #ffebee;
            color: #c62828;
        }

        /* =====================================================
           HOME RANKING (with flags)
           ===================================================== */
        .home-ranking-cat {
            margin-bottom: 20px;
        }

        .home-ranking-cat-title {
            font-size: 13px;
            font-weight: 700;
            color: #0077b6;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ranking-table--clean {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e8e8e8;
        }

        .ranking-table--clean thead th {
            background: #1a1a2e;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 9px 14px;
            text-align: center;
        }

        .ranking-table--clean tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #333;
            text-align: center;
            vertical-align: middle;
        }

        .ranking-table--clean tbody tr:last-child td {
            border-bottom: none;
        }

        .ranking-table--clean tbody tr:nth-child(even) td {
            background: #fafafa;
        }

        .ranking-table--clean .rank-1 td {
            background: #fffde7 !important;
        }

        .ranking-table--clean .rank-2 td {
            background: #f5f5f5 !important;
        }

        .ranking-table--clean .rank-3 td {
            background: #fff3e0 !important;
        }

        .player-flag {
            font-size: 15px;
            margin-right: 4px;
        }

        .player-flag img {
            background: #e3f2fd;
            padding: 1px;
        }

        .country-cell {
            color: #888;
            font-size: 12px;
        }

        /* =====================================================
           CHAMPION PODIUM STYLES
           ===================================================== */
        .champion-podium {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 12px;
            padding: 12px 0;
        }

        .champion-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 20px 16px;
            border-radius: 12px;
            min-width: 110px;
            background: #fff;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .champion-slot:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .12);
        }

        .champion-slots-wrapper {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 12px;
        }

        .champion-medal {
            font-size: 36px;
            line-height: 1;
            margin-bottom: 6px;
        }

        .champion-name {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            text-align: center;
            word-break: keep-all;
            margin-bottom: 3px;
        }

        .champion-label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-align: center;
        }

        .champion-cat-section {
            margin-bottom: 24px;
        }

        .champion-cat-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 2px solid #e0e0e0;
            display: inline-block;
        }

        /* =====================================================
           ENHANCED CARD & OVERALL STYLES
           ===================================================== */
        .card {
            border-radius: 16px !important;
            box-shadow: 0 2px 16px rgba(0, 0, 0, .08) !important;
            border: 1px solid rgba(0, 0, 0, .06) !important;
            overflow: hidden;
            transition: box-shadow 0.25s;
        }

        .card:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, .12) !important;
        }

        .card-title {
            font-size: 17px !important;
            font-weight: 700 !important;
            color: #1a1a2e !important;
            margin-bottom: 14px !important;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            border-radius: 8px !important;
            font-weight: 600 !important;
            font-size: 13px !important;
            transition: all 0.2s !important;
            border: none !important;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
        }

        .btn-primary {
            background: #0077b6 !important;
        }

        .btn-primary:hover {
            background: #005f92 !important;
        }

        .btn-success {
            background: #43a047 !important;
        }

        .btn-danger {
            background: #e53935 !important;
        }

        .btn-warning {
            background: #fb8c00 !important;
            color: #fff !important;
        }

        .btn-info {
            background: #039be5 !important;
        }

        .rank-num {
            width: 28px;
            height: 28px;
            line-height: 28px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .rank-num--1 {
            background: #ffd700;
        }

        .rank-num--2 {
            background: #bdbdbd;
        }

        .rank-num--3 {
            background: #ff8f00;
            color: #fff;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0077b6 50%, #1a1a2e 100%) !important;
            padding: 24px 40px !important;

        }
        .gm-cell--draw:hover {
            background: #fff8e1 !important;
        }
        .gm-cell--empty {
            color: #d0d0d0;
            font-size: 15px;
            background: #fff !important;
        }
        .gm-bigscore {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .gm-bigscore--win { color: #2e7d32; }
        .gm-bigscore--lose { color: #c62828; }
        .gm-bigscore--draw { color: #f57f17; }
        /* Global detail section below matrix */
        .gm-detail-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            margin: 4px 0 10px;
            font-size: 12px;
            font-weight: 600;
            color: #0077b6;
            background: #e8f4fd;
            border: 1px solid #b8d8f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .gm-detail-toggle:hover {
            background: #d0ebfa;
        }
        .gm-detail-toggle.active {
            background: #ffd54f;
            color: #333;
            border-color: #f0c030;
        }
        .gm-detail-area {
            display: none;
            margin: 6px 0 4px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #fafcff;
            overflow: hidden;
        }
        .gm-detail-area.open { display: block; }
        .gm-detail-match {
            display: flex;
            align-items: flex-start;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            gap: 14px;
        }
        .gm-detail-match:last-child { border-bottom: none; }
        .gm-detail-label {
            font-size: 12px;
            font-weight: 700;
            color: #333;
            white-space: nowrap;
            min-width: 120px;
            padding-top: 2px;
        }
        .gm-detail-label .rt-flag img { width: 18px; height: 12px; vertical-align: middle; margin-right: 3px; border-radius: 2px; }
        .gm-detail-scores { flex: 1; min-width: 0; }
        .gm-detail-venue {
            font-size: 11px;
            color: #0d47a1;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .gm-flag img { width: 18px; height: 12px; vertical-align: middle; border-radius: 2px; }

        /* ===== 可视化 & 图片上传 ===== */
        .chart-container { width:100%; height:340px; }
        .chart-container-sm { width:100%; height:280px; }
        .viz-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 6px;
        }
        .viz-stat-card {
            background: #f8f9fb;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid #eee;
        }
        .viz-stat-card .v-value {
            font-size: 26px;
            font-weight: 700;
            color: #0077b6;
        }
        .viz-stat-card .v-label {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }
        .viz-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .viz-tab-bar {
            display: flex;
            gap: 2px;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .viz-tab {
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all .2s;
            color: #666;
            user-select: none;
        }
        .viz-tab:hover {
            color: #333;
            background: #f5f7fa;
        }
        @media (max-width:768px) { .viz-row { grid-template-columns:1fr; } }
        .viz-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .viz-controls select, .viz-controls input[type="file"] {
            padding: 7px 10px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
        }
        .viz-controls select:focus {
            border-color: #0077b6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,119,182,.15);
        }
        .upload-zone {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 14px;
            transition: all .3s;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #0077b6;
            background: #f0f7ff;
        }
        .upload-zone .uz-icon { font-size: 40px; color: #ccc; }
        .upload-zone .uz-text { font-size: 14px; color: #999; margin-top: 6px; }
        .upload-zone .uz-hint { font-size: 12px; color: #bbb; margin-top: 4px; }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .preview-item {
            border-radius: 8px; overflow: hidden;
            border: 1px solid #eee; background: #fafafa;
            position: relative;
        }
        .preview-item img { width:100%; height:120px; object-fit:cover; display:block; }
        .preview-item .pi-info { padding:6px 8px; font-size:11px; color:#666; }
        .sub-tabs {
            display: flex; gap: 4px; margin-bottom: 14px;
        }
        .sub-tab {
            padding: 7px 16px; cursor: pointer; font-size: 13px; font-weight: 600;
            color: #666; border-radius: 6px; transition: all .2s;
            background: #f0f0f0;
        }
        .sub-tab:hover { background: #e0e0e0; }
        .sub-tab.active { background: #0077b6; color: #fff; }
        .sub-content { display: none; }
        .sub-content.active { display: block; }
        .viz-toast {
            position: fixed; top: 20px; right: 20px; padding: 12px 18px;
            border-radius: 10px; color: #fff; font-weight: 600; font-size: 13px;
            z-index: 99999; box-shadow: 0 4px 20px rgba(0,0,0,.2);
            transform: translateX(120%); transition: transform .3s ease;
            max-width: 360px;
        }
        .viz-toast.show { transform: translateX(0); }
        .viz-toast.success { background: #43a047; }
        .viz-toast.error { background: #e53935; }
        .viz-toast.info { background: #0077b6; }
        .loading-spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid #ccc; border-top-color: #0077b6;
            border-radius: 50%; animation: spin .6s linear infinite;
            margin-right: 4px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

        function getFlag(country) {
            if (!country) return '';
            const name = country.trim();

            // 跨国组合：国旗 + 国家名
            if (name.includes('/') || name.includes('+') || name.includes('&')) {
                const sep = name.includes('/') ? '/' : (name.includes('+') ? '+' : '&');
                const countries = name.split(sep).map(c => c.trim()).filter(c => c);
                if (countries.length > 1) {
                    return countries.map(c => {
                        const flag = getFlag(c);
                        return flag ? `${flag}<span style="margin-right:3px;">${c}</span>` : c;
                    }).join(`<span style="margin:0 4px;color:#ccc;">${sep}</span>`);
                }
                return getFlag(countries[0] || '');
            }

            // 1. 特殊处理：中华台北/中国台北 (梅花旗)
            // 使用专用的静态图片链接
            const TPE_FLAG = "https://picx.zhimg.com/80/v2-0c2290da259b563d9269af076b1e0ca9_1440w.webp?source=1def8aca";
            const taipeiVariants = ["中华台北", "中国台北", "Chinese Taipei", "TPE"];
            if (taipeiVariants.some(v => name.includes(v))) {
                return `<img src="${TPE_FLAG}" width="24" height="16" style="border-radius:2px;vertical-align:middle;border:1px solid #eee;background:#e3f2fd;padding:1px;" alt="${name}">`;
            }
            const GGGH_FLAG = "https://th.bing.com/th/id/R.24375a00402ca3867081c119fb7625bf?rik=BKMR0UOStMtpWQ&pid=ImgRaw&r=0";
            const ggghVariants = ["刚果民主共和国"];
            if (ggghVariants.some(v => name.includes(v))) {
                return `<img src="${GGGH_FLAG}" width="24" height="16" style="border-radius:2px;vertical-align:middle;border:1px solid #eee;background:#e3f2fd;padding:1px;" alt="${name}">`;
            }
            const GG_FLAG = "https://tse3.mm.bing.net/th/id/OIP.SX_ajduMnw3TMTb3vst0wgHaE8?w=600&h=400&rs=1&pid=ImgDetMain&o=7&rm=3";
            const ggVariants = ["刚果"];
            if (ggVariants.some(v => name.includes(v))) {
                return `<img src="${GG_FLAG}" width="24" height="16" style="border-radius:2px;vertical-align:middle;border:1px solid #eee;background:#e3f2fd;padding:1px;" alt="${name}">`;
            }
            // 2. 精确匹配 GLOBAL_FLAG_MAP
            const code = GLOBAL_FLAG_MAP[name];
            if (code) {
                return `<img src="https://flagcdn.com/w40/${code}.png" width="24" height="16" style="border-radius:2px;vertical-align:middle;background:#e3f2fd;padding:1px;" alt="${name}">`;
            }

            // 3. 模糊匹配
            for (const [key, val] of Object.entries(GLOBAL_FLAG_MAP)) {
                if (name.includes(key) || key.includes(name)) {
                    // 如果模糊匹配中包含"台北"，依然返回梅花旗
                    if (name.includes("台北") || key.includes("台北")) {
                        return `<img src="${TPE_FLAG}" width="24" height="16" style="border-radius:2px;vertical-align:middle;border:1px solid #eee;background:#e3f2fd;padding:1px;" alt="${name}">`;
                    }
                    return `<img src="https://flagcdn.com/w40/${val}.png" width="24" height="16" style="border-radius:2px;vertical-align:middle;background:#e3f2fd;padding:1px;" alt="${name}">`;
                }
            }
            return '';
        }

        // 比赛详情专用：跨国组合只显示国旗
        function getFlagForMatch(country) {
            if (!country) return '';
            const name = country.trim();
            if (name.includes('/') || name.includes('+') || name.includes('&')) {
                const sep = name.includes('/') ? '/' : (name.includes('+') ? '+' : '&');
                const countries = name.split(sep).map(c => c.trim()).filter(c => c);
                if (countries.length > 1) {
                    return countries.map(c => getFlag(c)).join('<span style="margin:0 2px;color:#999;">/</span>');
                }
                return getFlag(countries[0] || '');
            }
            return `<span class="rt-flag">${getFlag(name)}</span>`;
        }

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

            document.getElementById('page-' + page).style.display = 'block';
        }

        function showHome() {
            showPage('home');
            document.querySelector('.nav-item[data-page="home"]').classList.add('active');
            loadHomeData();
        }

        function loadPageData(page) {
            switch (page) {
                case 'home': loadHomeData(); break;
                case 'players': loadPlayers(); break;
                case 'competitions': loadCompetitions(); break;
                case 'ranking-manage': loadRankingManage(); break;
                case 'champions': loadChampionsPage(); break;
                case 'visualization':
                    loadVizPlayerList();
                    break;
            }
        }

        // ========== 首页数据 ==========
        async function loadHomeData() {
            try {
                const annRes = await fetch(`${API_BASE}/announcements/published`);
                const announcements = await annRes.json();

                // --- 公告列表 ---
                const annHtml = announcements.length ? announcements.map(a => `
                    <div class="announcement-item" onclick="showAnnouncementDetail(${a.id})">
                        <div class="announcement-title">${a.title}</div>
                        <div>${a.content.substring(0, 100)}${a.content.length > 100 ? '...' : ''}</div>
                        <div class="announcement-date">${a.updatedAt ? new Date(a.updatedAt).toLocaleDateString() : (a.createdAt ? new Date(a.createdAt).toLocaleDateString() : '-')}</div>
                    </div>
                    `).join('') : '<div class="empty-state">暂无公告</div>';
                document.getElementById('announcements-list').innerHTML = annHtml;

                // --- 加载实时排名 TOP 3（带国旗）---
                await loadHomeRanking();
            } catch (e) {
                console.error(e);
            }
        }

        // 实时排名 TOP 3（带国旗）
        async function loadHomeRanking() {
            const currentYear = new Date().getFullYear();
            let rankHtml = '';
            try {
                const res = await fetch(`${API_BASE}/rankings/year/${currentYear}`);
                const rankings = await res.json();
                if (!rankings || rankings.length === 0) {
                    rankHtml = '<div class="empty-state">暂无排名数据</div>';
                } else {
                    const grouped = {};
                    rankings.forEach(r => {
                        const cat = r.category || '其他';
                        if (!grouped[cat]) grouped[cat] = [];
                        grouped[cat].push(r);
                    });
                    const categories = ['u11男单', 'u11女单', 'u13男单', 'u13女单', 'u15男单', 'u15女单', 'u15男双', 'u15女双', 'u15混双', 'u15男团', 'u15女团', 'u17男单', 'u17女单', 'u17男双', 'u17女双', 'u17混双', 'u19男单', 'u19女单', 'u19男双', 'u19女双', 'u19混双', 'u19男团', 'u19女团', '男单', '女单', '男双', '女双', '混双', '男团', '女团'];
                    categories.forEach(cat => {
                        if (grouped[cat] && grouped[cat].length > 0) {
                            const top3 = grouped[cat].slice(0, 3).sort((a, b) => (a.ranking || 999) - (b.ranking || 999));
                            rankHtml += `
                    <div class="home-ranking-cat">
                        <h4 class="home-ranking-cat-title">${cat} TOP 3</h4>
                        <table class="ranking-table ranking-table--clean">
                            <tbody>
                                ${top3.map((p, i) => `
                                                <tr class="rank-${i + 1}">
                                                    <td><span class="rank-num rank-num--${i + 1}">${p.ranking || i + 1}</span></td>
                                                    <td><span class="player-flag">${getFlag(p.country)}</span>${p.playerName}</td>
                                                    <td class="country-cell">${(p.country || '').includes('/') || (p.country || '').includes('+') || (p.country || '').includes('&') ? '-' : (p.country || '-')}</td>
                                                    <td class="points">${p.points}</td>
                                                </tr>
                                            `).join('')}
                            </tbody>
                        </table>
                    </div>
                    `;
                        }
                    });
                }
            } catch (e) {
                console.error(e);
                rankHtml = '<div class="empty-state">暂无排名数据</div>';
            }
            document.getElementById('home-ranking').innerHTML = rankHtml;
        }

        // ========== 赛事详情：比赛轮次信息 ===========
        let currentDetailCategory = '';

        function renderDetailRounds(container, matches) {
            const categories = ['u11男单', 'u11女单', 'u13男单', 'u13女单', 'u15男单', 'u15女单', 'u15男双', 'u15女双', 'u15混双', 'u15男团', 'u15女团', 'u17男单', 'u17女单', 'u17男双', 'u17女双', 'u17混双', 'u19男单', 'u19女单', 'u19男双', 'u19女双', 'u19混双', 'u19男团', 'u19女团', '男单', '女单', '男双', '女双', '混双', '男团', '女团'];
            const roundOrder = ['资格赛', '小组赛', '第一轮', '第二轮', '第三轮', '第四轮', '1/128', '1/64', '1/32', '1/16', '1/8', '1/4', '四分之一决赛', '四分之一', '半决', '半决赛', '决赛', '铜牌', '冠军', '亚军'];
            const grouped = {};
            matches.forEach(m => {
                const cat = m.category || '其他';
                if (!grouped[cat]) grouped[cat] = {};
                const key = m.roundNumber || '其他';
                if (!grouped[cat][key]) grouped[cat][key] = [];
                grouped[cat][key].push(m);
            });

            const availableCategories = categories.filter(cat => grouped[cat]);
            if (availableCategories.length === 0) {
                container.innerHTML = '<div class="empty-state" style="background:#f5f5f5;color:#999;">暂无比赛记录</div>';
                return;
            }

            const defaultCat = currentDetailCategory && grouped[currentDetailCategory] ? currentDetailCategory : availableCategories[0];
            currentDetailCategory = defaultCat;

            let tabsHtml = `<div class="bracket-toggle-btns" style="margin-bottom:12px;">`;
            availableCategories.forEach((cat, i) => {
                tabsHtml += `<button class="bracket-category-tab ${cat === defaultCat ? 'active' : ''}" onclick="switchDetailCategory('${cat}', this)">${cat}</button>`;
            });
            tabsHtml += `</div>`;

            let contentHtml = '';
            availableCategories.forEach((cat, i) => {
                const catData = grouped[cat];
                const roundKeys = Object.keys(catData).sort((a, b) => {
                    const ia = roundOrder.findIndex(k => a.includes(k));
                    const ib = roundOrder.findIndex(k => b.includes(k));
                    if (ia !== -1 && ib !== -1) return ia - ib;
                    if (ia !== -1) return 1;
                    if (ib !== -1) return -1;
                    const numA = parseInt(a);
                    const numB = parseInt(b);
                    if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                    if (!isNaN(numA)) return 1;
                    if (!isNaN(numB)) return -1;
                    return a.localeCompare(b, 'zh');
                });
                if (roundKeys.length === 0) return;

                contentHtml += `<div id="detail-cat-${cat}" class="detail-category-content" style="display:${cat === defaultCat ? 'block' : 'none'};">`;
                contentHtml += `<div class="round-cat">`;
                roundKeys.forEach(key => {
                    const roundMatches = catData[key];
                    const isGroup = key.includes('组');
                    contentHtml += `<div class="round-section${isGroup ? ' is-group' : ''}">`;
                    contentHtml += `<div class="round-header"><span class="round-header-dot"></span>${key}</div>`;
                    if (isGroup) {
                        // --- 小组赛：矩阵布局 ---
                        const isTeamGroup = roundMatches.some(function(mx){ return mx.category && mx.category.indexOf('团') >= 0; });

                        // Extract unique participants
                        var participants = [];
                        if (isTeamGroup) {
                            var countrySet = {};
                            roundMatches.forEach(function(mx){
                                if (mx.player1Country) countrySet[mx.player1Country] = true;
                                if (mx.player2Country) countrySet[mx.player2Country] = true;
                            });
                            participants = Object.keys(countrySet);
                        } else {
                            var nameSet = {};
                            roundMatches.forEach(function(mx){
                                if (mx.player1Name) nameSet[mx.player1Name] = true;
                                if (mx.player2Name) nameSet[mx.player2Name] = true;
                            });
                            participants = Object.keys(nameSet);
                        }
                        participants.sort();

                        // Build participant -> matches lookup
                        var matchLookup = {};
                        var allMatchDetails = []; // collect all matches for bottom detail section
                        roundMatches.forEach(function(mx){
                            var a = isTeamGroup ? (mx.player1Country||'') : (mx.player1Name||'');
                            var b = isTeamGroup ? (mx.player2Country||'') : (mx.player2Name||'');
                            if (!a || !b) return;
                            var key = [a, b].sort().join('|||');
                            matchLookup[key] = mx;
                            allMatchDetails.push({ p1: a, p2: b, match: mx });
                        });

                        // Helper: extract athlete names from team roster string
                        // Format: "张禹珍，安宰贤，林钟勋，朴康贤，李尚洙" or "张三,李四"
                        function extractTeamRoster(str) {
                            if (!str) return null;
                            var parts = null;
                            if (str.indexOf('，') >= 0) parts = str.split('，');
                            else if (str.indexOf(',') >= 0) parts = str.split(',');
                            if (!parts || parts.length < 2) return null;
                            var result = [];
                            for (var ei = 0; ei < parts.length; ei++) {
                                var name = parts[ei].trim();
                                if (name) result.push(name);
                            }
                            return result.length > 0 ? result : null;
                        }

                        // Aggregate all athletes per country across ALL group matches
                        var countryAthletes = {};
                        if (isTeamGroup) {
                            roundMatches.forEach(function(mx){
                                // Primary: parse teamScores sub-match data
                                if (mx.teamScores) {
                                    try {
                                        var ts = JSON.parse(mx.teamScores);
                                        ts.forEach(function(sub){
                                            if (sub.p1 && sub.p1Country) {
                                                if (!countryAthletes[sub.p1Country]) countryAthletes[sub.p1Country] = [];
                                                if (countryAthletes[sub.p1Country].indexOf(sub.p1) < 0) countryAthletes[sub.p1Country].push(sub.p1);
                                            }
                                            if (sub.p2 && sub.p2Country) {
                                                if (!countryAthletes[sub.p2Country]) countryAthletes[sub.p2Country] = [];
                                                if (countryAthletes[sub.p2Country].indexOf(sub.p2) < 0) countryAthletes[sub.p2Country].push(sub.p2);
                                            }
                                        });
                                    } catch(e) {}
                                }
                                // Fallback: try to extract roster from player1Name/player2Name
                                var c1 = mx.player1Country ? mx.player1Country.trim() : '';
                                var c2 = mx.player2Country ? mx.player2Country.trim() : '';
                                var r1 = extractTeamRoster(mx.player1Name);
                                var r2 = extractTeamRoster(mx.player2Name);
                                if (r1 && c1) {
                                    if (!countryAthletes[c1]) countryAthletes[c1] = [];
                                    r1.forEach(function(n){ if (countryAthletes[c1].indexOf(n) < 0) countryAthletes[c1].push(n); });
                                }
                                if (r2 && c2) {
                                    if (!countryAthletes[c2]) countryAthletes[c2] = [];
                                    r2.forEach(function(n){ if (countryAthletes[c2].indexOf(n) < 0) countryAthletes[c2].push(n); });
                                }
                            });
                        }

                        function gmDisplay(p){
                            return isTeamGroup ? (getFlagForMatch(p) + p) : p;
                        }

                        var matrixHtml = '<div class="group-matrix-wrap"><table class="group-matrix"><thead><tr>';
                        matrixHtml += '<th class="gm-corner"></th>';
                        participants.forEach(function(p){
                            matrixHtml += '<th>' + gmDisplay(p) + '</th>';
                        });
                        matrixHtml += '</tr></thead><tbody>';

                        participants.forEach(function(p1, i){
                            matrixHtml += '<tr>';
                            matrixHtml += '<td class="gm-side">' + gmDisplay(p1) + '</td>';
                            participants.forEach(function(p2, j){
                                if (i === j) {
                                    matrixHtml += '<td class="gm-cell gm-cell--empty">-</td>';
                                } else {
                                    var key = [p1, p2].sort().join('|||');
                                    var match = matchLookup[key];
                                    if (match) {
                                        var mp1Total = 0, mp2Total = 0;
                                        try { if (match.scores) { var ms = JSON.parse(match.scores); ms.forEach(function(s){ if (s.p1 > s.p2) mp1Total++; else if (s.p2 > s.p1) mp2Total++; }); } } catch(e) {}
                                        if (mp1Total === 0 && mp2Total === 0 && match.teamScores && match.player1Total != null) {
                                            mp1Total = match.player1Total; mp2Total = match.player2Total;
                                        }
                                        // Determine which participant in this cell maps to the row/column
                                        // For cell (i,j): row player = p1, col player = p2
                                        // We need to check if the match's actual p1 equals the row's p1
                                        var actualP1 = isTeamGroup ? (match.player1Country||'') : (match.player1Name||'');
                                        var actualP2 = isTeamGroup ? (match.player2Country||'') : (match.player2Name||'');
                                        // Scores from row's perspective: rowScore:colScore
                                        var displayScore;
                                        if (actualP1 === p1) { displayScore = mp1Total + ':' + mp2Total; }
                                        else { displayScore = mp2Total + ':' + mp1Total; }
                                        var bigScore = (mp1Total > 0 || mp2Total > 0)
                                            ? '<div style="font-size:17px;font-weight:800;letter-spacing:0.5px;color:#2e7d32;">' + displayScore + '</div>'
                                            : '<div style="color:#bbb;font-size:11px;padding:4px 0;">未赛</div>';
                                        matrixHtml += '<td class="gm-cell">' + bigScore + '</td>';
                                    } else {
                                        matrixHtml += '<td class="gm-cell gm-cell--empty">-</td>';
                                    }
                                }
                            });
                            matrixHtml += '</tr>';
                        });
                        matrixHtml += '</tbody></table></div>';

                        // Global detail toggle button + hidden detail area
                        var groupDetailId = 'gmAll_' + cat.replace(/[^a-zA-Z0-9]/g,'_') + '_' + key.replace(/[^a-zA-Z0-9]/g,'_');
                        // Build all matches detail HTML
                        var allDetailHtml = '';
                        allMatchDetails.forEach(function(item, idx){
                            var mx = item.match;
                            var mp1D = item.p1.trim(), mp2D = item.p2.trim();
                            var mp1Total = 0, mp2Total = 0;
                            try { if (mx.scores) { var ms = JSON.parse(mx.scores); ms.forEach(function(s){ if (s.p1 > s.p2) mp1Total++; else if (s.p2 > s.p1) mp2Total++; }); } } catch(e) {}
                            if (mp1Total === 0 && mp2Total === 0 && mx.teamScores && mx.player1Total != null) { mp1Total = mx.player1Total; mp2Total = mx.player2Total; }
                            var detailHtml = buildGroupDetailContent(mx);
                            // For team groups: if no detail scores, generate fallback matchups from athlete lists
                            if (isTeamGroup && (!detailHtml || detailHtml.indexOf('暂无比分') >= 0)) {
                                var t1 = countryAthletes[mp1D] || [];
                                var t2 = countryAthletes[mp2D] || [];
                                // Debug: check if player1Name has roster data
                                if (t1.length === 0 && t2.length === 0) {
                                    console.log('No countryAthletes for', mp1D, mp2D, 'player1Name=', mx.player1Name, 'player2Name=', mx.player2Name, 'teamScores=', mx.teamScores);
                                }
                                if (t1.length > 0 || t2.length > 0) {
                                    var fbHtml = '';
                                    var maxLen = Math.max(t1.length, t2.length);
                                    for (var fi = 0; fi < maxLen; fi++) {
                                        var fp1 = t1[fi] || '待定';
                                        var fp2 = t2[fi] || '待定';
                                        fbHtml += '<div style="border-top:1px solid #eee;padding:6px 0;">' +
                                            '<div style="display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#444;margin-bottom:4px;">' +
                                            '<span style="color:#333;">' + (mp1D ? getFlagForMatch(mp1D) : '') + fp1 + '</span>' +
                                            '<span style="color:#999;font-weight:400;">vs</span>' +
                                            '<span style="color:#333;">' + (mp2D ? getFlagForMatch(mp2D) : '') + fp2 + '</span></div></div>';
                                    }
                                    detailHtml = fbHtml;
                                }
                            }
                            var bigScoreStr = (mp1Total > 0 || mp2Total > 0) ? mp1Total + ':' + mp2Total : '-';
                            var p1Won = mp1Total > mp2Total;
                            var mcVenueInfo = mx.venue ? '🏟️ ' + mx.venue : '';
                            var mcDateStr = mx.matchDate ? new Date(mx.matchDate).toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
                            var mp1Display = isTeamGroup ? (getFlagForMatch(mp1D) + mp1D) : (mx.player1Country ? getFlagForMatch(mx.player1Country) : '') + mp1D;
                            var mp2Display = isTeamGroup ? (getFlagForMatch(mp2D) + mp2D) : (mx.player2Country ? getFlagForMatch(mx.player2Country) : '') + mp2D;
                            // For team groups, append athlete names from aggregate
                            if (isTeamGroup) {
                                var t1List = countryAthletes[mp1D];
                                var t2List = countryAthletes[mp2D];
                                if (t1List && t1List.length > 0) mp1Display += ' (' + t1List.join(', ') + ')';
                                if (t2List && t2List.length > 0) mp2Display += ' (' + t2List.join(', ') + ')';
                            }
                            // Format scores grid with big score (same as elimination)
                            var scScoresGrid = '';
                            var hasTeams = detailHtml.indexOf('border-top:1px') >= 0;
                            var hasSingles = detailHtml.indexOf('match-scores-grid') >= 0;
                            if (hasSingles || hasTeams) {
                                if (hasTeams) {
                                    // Team sub-matches layout: wrap in flex container
                                    scScoresGrid = '<div style="display:flex;align-items:stretch;gap:10px;">' +
                                        '<div style="flex:1;min-width:0;padding:4px 0;">' + detailHtml + '</div>' +
                                        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;margin-left:auto;">' +
                                        '<span class="gm-bigscore gm-bigscore--win">' + bigScoreStr + '</span></div></div>';
                                } else {
                                    // Singles/doubles
                                    scScoresGrid = '<div style="display:flex;align-items:stretch;gap:10px;">' +
                                        detailHtml +
                                        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;margin-left:auto;">' +
                                        '<span class="gm-bigscore gm-bigscore--win">' + bigScoreStr + '</span></div></div>';
                                }
                            } else {
                                // No scores
                                scScoresGrid = detailHtml;
                            }
                            allDetailHtml += '<div class="match-card">' +
                                '<div class="match-card-top">' +
                                    '<span class="match-card-venue">' + mcVenueInfo + '</span>' +
                                '</div>' +
                                '<div class="match-card-body">' +
                                    '<div class="match-player-row">' +
                                        '<span class="match-player-name ' + (p1Won ? 'match-player-name--win' : '') + '">' + mp1Display + '</span>' +
                                        '<div style="display:flex;align-items:center;gap:10px;margin-left:auto;">' +
                                            '<div class="match-card-actions">' +
                                                '<button class="btn btn-warning btn-sm" onclick="event.stopPropagation();editMatch(' + mx.id + ')">编辑</button>' +
                                                '<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteMatch(' + mx.id + ')">删除</button>' +
                                            '</div>' +
                                        '</div>' +
                                    '</div>' +
                                    scScoresGrid +
                                    '<div class="match-player-row">' +
                                        '<span class="match-player-name ' + (!p1Won ? 'match-player-name--win' : '') + '">' + mp2Display + '</span>' +
                                        (mcDateStr ? '<span class="match-player-time" style="margin-left:auto;">' + mcDateStr + '</span>' : '') +
                                    '</div>' +
                                '</div>' +
                            '</div>';
                        });
                        matrixHtml += '<div style="margin-top:2px;text-align:center;">' +
                            '<button class="gm-detail-toggle" onclick="toggleGroupAllDetail(\'' + groupDetailId + '\',this)">📋 查看所有对局详细比分</button>' +
                            '</div>' +
                            '<div id="' + groupDetailId + '" class="gm-detail-area">' + allDetailHtml + '</div>';
                        contentHtml += matrixHtml;
                    } else {
                        // --- 非小组赛：原有卡片样式 ---
                        roundMatches.forEach(function(m) {
                        let scores = [];
                        let p1Total = 0, p2Total = 0;
                        try { if (m.scores) { scores = JSON.parse(m.scores); scores.forEach(s => { if (s.p1 > s.p2) p1Total++; else if (s.p2 > s.p1) p2Total++; }); } } catch (e) { }
                        // 团体赛但没有scores时使用存储的player1Total/player2Total
                        if (p1Total === 0 && p2Total === 0 && m.teamScores && m.player1Total != null) {
                            p1Total = m.player1Total;
                            p2Total = m.player2Total;
                        }
                        const p1Name = m.player1Name || '-';
                        const p2Name = m.player2Name || '-';
                        const p1Country = m.player1Country || '';
                        const p2Country = m.player2Country || '';
                        const p1Won = p1Total > p2Total && p1Total > 0;
                        const p2Won = p2Total > p1Total && p2Total > 0;
                        const isTeamMatch = m.category && m.category.includes('团');
                        const isDoublesMatch = m.category === '男双' || m.category === '女双' || m.category === '混双';
                        const maxLen = isDoublesMatch ? 15 : (isTeamMatch ? 20 : 999);
                        const p1DisplayName = (maxLen < 999 && p1Name.length > maxLen ? p1Name.substring(0, maxLen) + '...' : p1Name) || '-';
                        const p2DisplayName = (maxLen < 999 && p2Name.length > maxLen ? p2Name.substring(0, maxLen) + '...' : p2Name) || '-';
                        const p1Title = `title="${p1Name}"`;
                        const p2Title = `title="${p2Name}"`;
                        const p1FlagHtml = getFlagForMatch(p1Country);
                        const p2FlagHtml = getFlagForMatch(p2Country);
                        const matchDateStr = m.matchDate ? new Date(m.matchDate).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
                        const venueInfo = m.venue || '-';
                        const statusMap = { scheduled: '已安排', ongoing: '进行中', completed: '已完成', cancelled: '已取消' };
                        const isCompleted = m.status === 'completed';

                        // Big score
                        const bigScore = (p1Total > 0 || p2Total > 0)
                            ? `<span class="match-card-bigscore">${p1Total}:${p2Total}</span>`
                            : '';

                        // Two-row scores (each game: p1 score on p1 row, p2 score on p2 row)
                        // Big score and time on the far right, parallel to detailed scores
                        let scoresGridHtml = '';
                        if (!isTeamMatch) {
                            const validScores = scores.filter(s => !(s.p1 === 0 && s.p2 === 0));
                            if (validScores.length > 0) {
                                let p1RowHtml = '';
                                let p2RowHtml = '';
                                validScores.forEach(s => {
                                    const p1Win = s.p1 > s.p2;
                                    p1RowHtml += `<span class="match-score-item ${p1Win ? 'match-score-item--win' : 'match-score-item--lose'}">${s.p1}</span>`;
                                    p2RowHtml += `<span class="match-score-item ${!p1Win ? 'match-score-item--win' : 'match-score-item--lose'}">${s.p2}</span>`;
                                });
                                scoresGridHtml = `
                                    <div class="match-scores-grid">
                                        <div class="match-scores-row">${p1RowHtml}</div>
                                        <div class="match-scores-row">${p2RowHtml}</div>
                                    </div>
                                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;margin-left:auto;">
                                        ${bigScore}
                                    </div>
                                `;
                                // Wrap in a flex container with same gap as other rows
                                scoresGridHtml = `<div style="display:flex;align-items:stretch;gap:10px;">${scoresGridHtml}</div>`;
