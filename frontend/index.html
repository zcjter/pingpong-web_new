<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球比赛管理系统?v=6</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body, 'Lato', sans-serif);
            background: #e8f0fb;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #0057a8 0%, #0077b6 50%, #0096c7 100%);
            color: white;
            padding: 24px 40px;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .header h1 {
            font-size: 28px;
        }

        .nav {
            background: #1a1a2e;
            padding: 12px 40px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .nav-item {
            display: inline-block;
            padding: 10px 18px;
            cursor: pointer;
            color: rgba(255, 255, 255, .75);
            font-family: var(--font-header);
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            transition: all .25s;
        }

        .nav-item:hover {
            color: #ffd700;
            background: rgba(255, 255, 255, .08);
        }

        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, .12);
            box-shadow: inset 0 -2px 0 0 rgba(255, 215, 0, .5);
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .card {
            background: #fff;
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 22px;
            box-shadow: var(--shadow);
            color: #1c2a3a;
        }

        .card-title {
            font-family: var(--font-header);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #0b1c2b;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .ranking-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .ranking-table tr:hover {
            background: #f8f9fa;
        }

        .rank-num {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border-radius: 50%;
            background: #eee;
            font-weight: bold;
        }

        .rank-1 .rank-num {
            background: #ffd700;
            color: white;
        }

        .rank-2 .rank-num {
            background: #c0c0c0;
            color: white;
        }

        .rank-3 .rank-num {
            background: #cd7f32;
            color: white;
        }

        .points {
            color: #1a73e8;
            font-weight: bold;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-primary {
            background: #1a73e8;
            color: white;
        }

        .btn-success {
            background: #34a853;
            color: white;
        }

        .btn-danger {
            background: #ea4335;
            color: white;
        }

        .btn-warning {
            background: #fbbc04;
            color: white;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 25px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 18px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .announcement-item {
            padding: 15px;
            border-left: 4px solid #1a73e8;
            background: #f8f9fa;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .announcement-item:hover {
            background: #e8f0fe;
            transform: translateX(5px);
        }

        .announcement-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .announcement-date {
            font-size: 12px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 300px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .competition-card {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .competition-card:hover {
            background: #f8f9fa;
            border-color: #1a73e8;
        }

        .competition-info h4 {
            margin-bottom: 5px;
        }

        .competition-info p {
            font-size: 12px;
            color: #666;
            margin: 0;
        }

        .player-card {
            display: inline-block;
            width: 200px;
            padding: 15px;
            margin: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .player-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .player-card-actions {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .player-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1a73e8;
            color: white;
            line-height: 80px;
            font-size: 32px;
            margin: 0 auto 10px;
        }

        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-country {
            font-size: 12px;
            color: #666;
        }

        .player-detail-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .player-detail-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1a73e8;
            color: white;
            line-height: 100px;
            font-size: 48px;
            margin-right: 20px;
        }

        #detail-intro {
            margin-top: 10px;
            line-height: 1.6;
            color: #333;
        }

        #detail-intro h1,
        #detail-intro h2,
        #detail-intro h3 {
            margin: 10px 0 5px;
            color: #1a73e8;
        }

        #detail-intro p {
            margin: 8px 0;
        }

        #detail-intro ul,
        #detail-intro ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        #detail-intro code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        #detail-intro blockquote {
            border-left: 3px solid #1a73e8;
            padding-left: 10px;
            margin: 10px 0;
            color: #666;
        }

        .player-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1a73e8;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .back-btn {
            cursor: pointer;
            color: #1a73e8;
            margin-bottom: 15px;
            display: inline-block;
        }

        .announcement-detail {
            padding: 20px;
        }

        .announcement-content {
            line-height: 1.8;
            margin: 20px 0;
            white-space: pre-wrap;
        }

        .announcement-meta {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .score-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .score-table th,
        .score-table td {
            padding: 8px;
            text-align: center;
            border: 1px solid #eee;
        }

        .score-table th {
            background: #f8f9fa;
        }

        .score-table .winner {
            color: #34a853;
            font-weight: bold;
            background: #e8f5e9;
        }

        .score-table .loser {
            color: #999;
        }

        .game-scores {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .game-score {
            padding: 2px 8px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
        }

        .link-btn {
            background: none;
            border: none;
            color: #1a73e8;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
        }

        .link-btn:hover {
            color: #1557b0;
        }

        /* ===== NEW DESIGN TOKENS AND COMPONENT STYLES ===== */
        :root {
            --color-bg: #e8f0fb;
            --color-card: #ffffff;
            --color-primary: #1a1a2e;
            --color-accent: #ffd700;
            --color-blue: #0077b6;
            --color-dark: #1a1a2e;
            --radius: 14px;
            --shadow: 0 4px 20px rgba(0, 0, 0, .08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, .06);
            --font-header: 'Poppins', sans-serif;
            --font-body: 'Lato', sans-serif;
        }

        .score-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .score-input-row input {
            width: 60px;
            text-align: center;
        }

        .score-input-row span {
            font-weight: bold;
        }

        /* =====================================================
           MATCH ROUND INFO STYLES (参考图2风格)
           ===================================================== */
        .rounds-wrap {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 12px;
        }

        .round-cat {
            margin-bottom: 20px;
        }

        .round-cat-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 2px solid #0077b6;
            display: inline-block;
        }

        .round-section {
            margin-bottom: 14px;
        }

        .round-header {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: #0077b6;
            background: #e3f2fd;
            border-left: 3px solid #0077b6;
            padding: 5px 10px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 8px;
        }

        .round-header-dot {
            width: 6px;
            height: 6px;
            background: #0077b6;
            border-radius: 50%;
        }

        .round-table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
        }

        .round-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        .round-table thead th {
            background: #0077b6;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 9px 12px;
            text-align: center;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .round-table thead th:first-child {
            border-radius: 8px 0 0 0;
        }

        .round-table thead th:last-child {
            border-radius: 0 8px 0 0;
        }

        .round-row td {
            padding: 9px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 12px;
            color: #333;
            text-align: center;
            vertical-align: middle;
        }

        .round-row:last-child td {
            border-bottom: none;
        }

        .round-row:nth-child(even) td {
            background: #fafcff;
        }

        .round-row--winner td {
            background: transparent !important;
        }

        .rt-player {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .rt-flag img {
            width: 20px;
            height: 14px;
            border-radius: 2px;
            vertical-align: middle;
            background: #e3f2fd;
            padding: 1px;
        }

        .rt-name--win {
            font-weight: 700;
            color: #43a047;
        }

        .rt-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            flex-wrap: wrap;
        }

        .rs-game {
            display: inline-block;
            font-size: 10px;
            padding: 1px 4px;
            background: #e8e8e8;
            border-radius: 4px;
            color: #555;
            margin: 0 1px;
        }

        .rt-total {
            font-size: 14px;
            font-weight: 800;
            color: #b0bec5;
            min-width: 14px;
            display: inline-block;
            text-align: center;
        }

        .rt-total--win {
            color: #43a047;
        }

        .rt-sep {
            font-weight: 800;
            color: #ccc;
            margin: 0 2px;
            font-size: 14px;
        }

        .rt-venue {
            color: #888;
            font-size: 11px;
        }

        .rt-status-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .rt-status--completed {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .rt-status--ongoing {
            background: #fff8e1;
            color: #f57f17;
        }

        .rt-status--scheduled {
            background: #e3f2fd;
            color: #1565c0;
        }

        .rt-status--cancelled {
            background: #ffebee;
            color: #c62828;
        }

        /* =====================================================
           HOME RANKING (with flags)
           ===================================================== */
        .home-ranking-cat {
            margin-bottom: 20px;
        }

        .home-ranking-cat-title {
            font-size: 13px;
            font-weight: 700;
            color: #0077b6;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ranking-table--clean {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e8e8e8;
        }

        .ranking-table--clean thead th {
            background: #1a1a2e;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 9px 14px;
            text-align: center;
        }

        .ranking-table--clean tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            color: #333;
            text-align: center;
            vertical-align: middle;
        }

        .ranking-table--clean tbody tr:last-child td {
            border-bottom: none;
        }

        .ranking-table--clean tbody tr:nth-child(even) td {
            background: #fafafa;
        }

        .ranking-table--clean .rank-1 td {
            background: #fffde7 !important;
        }

        .ranking-table--clean .rank-2 td {
            background: #f5f5f5 !important;
        }

        .ranking-table--clean .rank-3 td {
            background: #fff3e0 !important;
        }

        .player-flag {
            font-size: 15px;
            margin-right: 4px;
        }

        .player-flag img {
            background: #e3f2fd;
            padding: 1px;
        }

        .country-cell {
            color: #888;
            font-size: 12px;
        }

        /* =====================================================
           CHAMPION PODIUM STYLES
           ===================================================== */
        .champion-podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            padding: 24px 16px 8px;
        }

        .champion-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 20px 20px;
            border-radius: 16px;
            min-width: 120px;
            min-height: 140px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .champion-slot:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .15);
        }

        .champion-slot--1 {
            background: linear-gradient(160deg, #ffd700 0%, #ffb300 100%);
        }

        .champion-slot--2 {
            background: linear-gradient(160deg, #e0e0e0 0%, #bdbdbd 100%);
        }

        .champion-slot--3 {
            background: linear-gradient(160deg, #ffcc80 0%, #ff8f00 100%);
        }

        .champion-medal {
            font-size: 40px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .champion-slot--1 .champion-medal {
            font-size: 52px;
        }

        .champion-name {
            font-size: 15px;
            font-weight: 800;
            color: #1a1a2e;
            text-align: center;
            word-break: keep-all;
            margin-bottom: 4px;
        }

        .champion-label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            color: #333;
            text-align: center;
        }

        .champion-cat-section {
            margin-bottom: 28px;
        }

        .champion-cat-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #ffd700;
            display: inline-block;
        }

        /* =====================================================
           ENHANCED CARD & OVERALL STYLES
           ===================================================== */
        .card {
            border-radius: 16px !important;
            box-shadow: 0 2px 16px rgba(0, 0, 0, .08) !important;
            border: 1px solid rgba(0, 0, 0, .06) !important;
            overflow: hidden;
            transition: box-shadow 0.25s;
        }

        .card:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, .12) !important;
        }

        .card-title {
            font-size: 17px !important;
            font-weight: 700 !important;
            color: #1a1a2e !important;
            margin-bottom: 14px !important;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            border-radius: 8px !important;
            font-weight: 600 !important;
            font-size: 13px !important;
            transition: all 0.2s !important;
            border: none !important;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
        }

        .btn-primary {
            background: #0077b6 !important;
        }

        .btn-primary:hover {
            background: #005f92 !important;
        }

        .btn-success {
            background: #43a047 !important;
        }

        .btn-danger {
            background: #e53935 !important;
        }

        .btn-warning {
            background: #fb8c00 !important;
            color: #fff !important;
        }

        .btn-info {
            background: #039be5 !important;
        }

        .rank-num {
            width: 28px;
            height: 28px;
            line-height: 28px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .rank-num--1 {
            background: #ffd700;
        }

        .rank-num--2 {
            background: #bdbdbd;
        }

        .rank-num--3 {
            background: #ff8f00;
            color: #fff;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0077b6 50%, #1a1a2e 100%) !important;
            padding: 24px 40px !important;
        }

        .header h1 {
            font-size: 26px !important;
            font-weight: 700 !important;
            letter-spacing: -0.5px;
        }

        .announcement-item {
            border-left: 4px solid #0077b6 !important;
            background: #f8f9fb !important;

        }

        .stat-box {

        .stat-value {

        .back-btn {

            font-size: 14px;
        }

        .search-box input {
            border: 1.5px solid #e0e0e0 !important;
            border-radius: 8px !important;
            padding: 9px 14px !important;
            font-size: 13px !important;
        }

        .search-box input:focus {
            border-color: #0077b6 !important;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 119, 182, .15);
        }

        .modal-content {
            border-radius: 16px !important;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .25) !important;
        }

        .modal-header {
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 14px;
            margin-bottom: 18px;
        }

        .modal-header h3 {
            font-weight: 700;
            color: #1a1a2e;
        }

        .close-btn:hover {
            color: #333;
        }

        .ranking-table .winner {
            color: #43a047 !important;
            background: transparent !important;
        }

        /* =====================================================
           TOURNAMENT BRACKET STYLES
           ===================================================== */
        .bracket-svg {
            display: block;
            margin: 0 auto;
        }

        .bracket-match-box {
            fill: #fff;
            stroke: #0077b6;
            stroke-width: 1.5;
            rx: 8;
            ry: 8;
        }

        .bracket-match-box:hover {
            fill: #f0f7ff;
            stroke: #005f92;
        }

        .bracket-match-box--winner {
            fill: #e8f5e9;
            stroke: #43a047;
        }

        .bracket-match-line {
            fill: none;
            stroke: #0077b6;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .bracket-player-text {
            font-family: 'Lato', sans-serif;
            font-size: 12px;
            fill: #333;
        }

        .bracket-player-text--winner {
            font-weight: 700;
            fill: #43a047;
        }

        .bracket-player-text--tbd {
            fill: #aaa;
            font-style: italic;
        }

        .bracket-score-text {
            font-family: 'Lato', sans-serif;
            font-size: 11px;
            fill: #666;
        }

        .bracket-score-text--winner {
            font-weight: 700;
            fill: #43a047;
        }

        .bracket-round-label {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 700;
            fill: #1a1a2e;
        }

        .bracket-champion-box {
            fill: linear-gradient(160deg, #ffd700 0%, #ffb300 100%);
        }

        .bracket-champion-text {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            fill: #1a1a2e;
        }

        .btn-view-active {
            background: #0077b6 !important;
            color: #fff !important;
        }

        #btn-view-table, #btn-view-bracket {
            padding: 6px 14px;
            font-size: 12px;
        }

        .ranking-table .loser {
            color: #aaa !important;
        }

        .game-score {
            background: #e8e8e8 !important;
            border-radius: 5px !important;
        }

        /* =====================================================
           MODAL STYLES
           ===================================================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .55);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 40px rgba(0, 0, 0, .25);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
        }

        .close-btn {
            font-size: 24px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
            line-height: 1;
        }

        .close-btn:hover {
            color: #333;
        }

        /* =====================================================
           UTILITY CLASSES
           ===================================================== */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #0077b6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 119, 182, .15);
        }

        .search-box {
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 9px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            box-sizing: border-box;
        }

        .search-box input:focus {
            border-color: #0077b6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 119, 182, .15);
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: #aaa;
            font-size: 14px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 14px;
            color: #0077b6;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .announcement-detail h2 {
            margin: 0 0 10px;
            color: #1a1a2e;
        }

        .announcement-detail {
            padding: 0;
        }

        .announcement-meta {
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .announcement-content {
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
        }

        .btn {
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
        }

        .btn-primary {
            background: #0077b6;
            color: #fff;
        }

        .btn-primary:hover {
            background: #005f92;
        }

        .btn-success {
            background: #43a047;
            color: #fff;
        }

        .btn-danger {
            background: #e53935;
            color: #fff;
        }

        .btn-warning {
            background: #fb8c00;
            color: #fff;
        }

        .btn-info {
            background: #039be5;
            color: #fff;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #0077b6;
            color: #0077b6;
            padding: 8px 16px;
        }

        .btn-outline:hover {
            background: #0077b6;
            color: #fff;
        }

        .btn-outline.active {
            background: #0077b6;
            color: #fff;
        }

        .btn+.btn {
            margin-left: 6px;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        /* =====================================================
           ANNOUNCEMENT & CARD ITEMS
           ===================================================== */
        .announcement-item {
            padding: 12px 14px;
            border-left: 4px solid #0077b6;
            background: #f8f9fb;
            border-radius: 0 8px 8px 0;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .announcement-item:hover {
            background: #e3f2fd;
            transform: translateX(4px);
            border-left-color: #ffd700;
        }

        .announcement-title {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .announcement-date {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .announcement-item>div:nth-child(2) {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        .competition-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .competition-card:hover {
            border-color: #0077b6;
            background: #f0f7ff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
        }

        .competition-info h4 {
            margin: 0 0 4px;
            font-size: 15px;
            color: #1a1a2e;
        }

        .competition-info p {
            margin: 0;
            font-size: 12px;
            color: #888;
        }

        .player-card {
            border: 1.5px solid #e0e0e0;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .player-card:hover {
            border-color: #0077b6;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .1);
            transform: translateY(-2px);
        }

        .player-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0077b6, #0096c7);
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }

        .player-name {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .player-country {
            font-size: 12px;
            color: #888;
        }

        .player-detail-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }

        .player-detail-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0077b6, #0096c7);
            color: #fff;
            font-size: 36px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .player-detail-info h2 {
            margin: 0 0 6px;
            color: #1a1a2e;
        }

        .player-detail-info p {
            margin: 0 0 4px;
            font-size: 14px;
            color: #666;
        }

        .player-stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }

        .stat-box {
            background: #f5f7fa;
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
            min-width: 90px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #0077b6;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .rank-num {
            width: 28px;
            height: 28px;
            line-height: 28px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .rank-num--1 {
            background: #ffd700;
        }

        .rank-num--2 {
            background: #bdbdbd;
        }

        .rank-num--3 {
            background: #ff8f00;
            color: #fff;
        }

        .points {
            font-weight: 700;
            color: #0077b6;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 9px 12px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .ranking-table th {
            background: #f5f7fa;
            font-weight: 600;
            color: #555;
            font-size: 12px;
        }

        .ranking-table tr:hover td {
            background: #f8f9fb;
        }

        .ranking-table .winner {
            color: #43a047;
            font-weight: 600;
        }

        /* ===== TOURNAMENT BRACKET STYLES ===== */
        .bracket-toggle-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .bracket-container {
            overflow-x: auto;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
            border-radius: 12px;
            min-height: 400px;
            width: 100%;
        }

        .bracket-svg {
            display: block;
        }

        .bracket-match-box {
            fill: #fff;
            stroke: #ddd;
            stroke-width: 1;
        }

        .bracket-match-box:hover {
            fill: #f0f7ff;
            stroke: #0077b6;
        }

        .bracket-match-line {
            fill: none;
            stroke: #666;
            stroke-width: 1.5;
        }

        .bracket-player-name {
            font-size: 12px;
            fill: #333;
            font-family: 'Lato', sans-serif;
        }

        .bracket-player-name--winner {
            font-weight: 700;
            fill: #43a047;
        }

        .bracket-player-name--empty {
            fill: #bbb;
            font-style: italic;
        }

        .bracket-divider {
            stroke: #eee;
            stroke-width: 1;
        }

        .bracket-round-label {
            font-size: 14px;
            font-weight: 700;
            fill: #1a1a2e;
            font-family: 'Poppins', sans-serif;
        }

        .bracket-category-tab {
            display: inline-block;
            padding: 6px 14px;
            margin-right: 6px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            background: #e8e8e8;
            color: #555;
            border: none;
            transition: all 0.2s;
        }

        .bracket-category-tab:hover {
            background: #d0d0d0;
        }

        .bracket-category-tab.active {
            background: #0077b6;
            color: #fff;
        }

        .bracket-no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🏓 乒乓球比赛管理系统</h1>
    </div>

    <div class="nav">
        <span class="nav-item active" data-page="home">首页</span>
        <span class="nav-item" data-page="players">著名运动员</span>
        <span class="nav-item" data-page="competitions">赛事管理</span>
        <span class="nav-item" data-page="ranking-manage">排名管理</span>
        <span class="nav-item" data-page="champions">赛事冠军</span>
    </div>

    <div class="container">
        <!-- 首页 -->
        <div id="page-home">
            <div class="card">
                <div class="actions">
                    <div class="card-title">📢 最新公告</div>
                    <button class="btn btn-primary" onclick="showAnnouncementModal()">+ 添加公告</button>
                </div>
                <div id="announcements-list"></div>
            </div>
            <div class="card">
                <div class="card-title">🏆 实时排名 TOP 3</div>
                <div id="home-ranking"></div>
            </div>
        </div>

        <!-- 著名运动员管理 -->
        <div id="page-players" style="display:none;">
            <div id="players-list-view">
                <div class="card">
                    <div class="actions">
                        <div class="card-title">👥 著名运动员列表</div>
                        <button class="btn btn-primary" onclick="showPlayerModal()">+ 添加运动员</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="player-search" placeholder="搜索运动员..."
                            onkeyup="searchPlayers(this.value)">
                    </div>
                    <div id="players-grid"></div>
                </div>
            </div>
            <div id="player-detail-view" style="display:none;">
                <span class="back-btn" onclick="showPlayersList()">← 返回列表</span>
                <div class="card">
                    <div class="player-detail">
                        <div class="player-detail-header">
                            <div class="player-detail-avatar" id="detail-avatar"></div>
                            <div class="player-detail-info">
                                <h2 id="detail-name"></h2>
                                <p id="detail-country"></p>
                                <p id="detail-intro"></p>
                            </div>
                        </div>
                        <div class="player-stats">
                            <div class="stat-box">
                                <div class="stat-value" id="detail-age">-</div>
                                <div class="stat-label">年龄</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value" id="detail-gender">-</div>
                                <div class="stat-label">性别</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value" id="detail-points">0</div>
                                <div class="stat-label">积分</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value" id="detail-rank">-</div>
                                <div class="stat-label">排名</div>
                            </div>
                        </div>
                        <div style="margin-top: 20px;">
                            <button class="btn btn-warning" onclick="editPlayer(currentPlayerId)">编辑</button>
                            <button class="btn btn-danger" onclick="deletePlayer(currentPlayerId)">删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 赛事管理 -->
        <div id="page-competitions" style="display:none;">
            <div id="competitions-list-view">
                <div class="card">
                    <div class="actions">
                        <div class="card-title">🏆 赛事列表</div>
                        <button class="btn btn-primary" onclick="showCompetitionModal()">+ 添加赛事</button>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <select id="competition-year-select" onchange="filterCompetitions()"
                            style="padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="">全部年份</option>
                        </select>
                    </div>
                    <div id="competitions-list"></div>
                </div>
            </div>
            <div id="competition-detail-view" style="display:none;">
                <span class="back-btn" onclick="showCompetitionsList()">← 返回赛事列表</span>
                <div class="card" style="margin-bottom:16px;">
                    <div class="actions">
                        <div class="card-title" id="competition-title"></div>
                        <div class="action-btns">
                            <button class="btn btn-outline" id="btn-toggle-roster" onclick="toggleRoster()">👥 参赛名单</button>
                            <button class="btn btn-primary" onclick="showMatchModal()">+ 添加比赛</button>
                        </div>
                    </div>
                </div>
                <div class="card" id="roster-card">
                    <div class="actions">
                        <div class="card-title">👥 参赛名单</div>
                        <button class="btn btn-success" onclick="showRosterFormModal()">+ 添加运动员</button>
                    </div>
                    <div id="roster-list-content"></div>
                </div>
                <div class="card">
                    <div class="actions">
                        <div class="card-title">📋 比赛信息</div>
                        <div class="action-btns">
                            <button class="btn btn-outline active" id="btn-view-table" onclick="switchMatchView('table')">📊 列表</button>
                            <button class="btn btn-outline" id="btn-view-bracket" onclick="switchMatchView('bracket')">🌳 对阵图</button>
                        </div>
                    </div>
                    <div id="detail-rounds-content"></div>
                    <div id="bracket-view" style="display:none;">
                        <div class="bracket-toggle-btns" id="bracket-categories"></div>
                        <div class="bracket-container" id="bracket-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 排名管理 -->
        <div id="page-ranking-manage" style="display:none;">
            <div class="card">
                <div class="actions">
                    <div class="card-title">📊 排名管理</div>
                    <button class="btn btn-primary" onclick="showRankingModal()">+ 添加排名</button>
                </div>
                <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                    <select id="ranking-year-select" onchange="loadRankingsByFilter()"
                        style="padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                        <option value="">选择年份</option>
                    </select>
                    <select id="ranking-category-select" onchange="loadRankingsByFilter()"
                        style="padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                        <option value="">全部项目</option>

        function getFlag(country) {
            if (!country) return '';
            const name = country.trim();

            // 1. 特殊处理：中华台北/中国台北 (梅花旗)
            // 使用专用的静态图片链接
            const TPE_FLAG = "https://picx.zhimg.com/80/v2-0c2290da259b563d9269af076b1e0ca9_1440w.webp?source=1def8aca";
            const taipeiVariants = ["中华台北", "中国台北", "Chinese Taipei", "TPE"];
            if (taipeiVariants.some(v => name.includes(v))) {
                return `<img src="${TPE_FLAG}" width="24" height="16" style="border-radius:2px;vertical-align:middle;border:1px solid #eee;background:#e3f2fd;padding:1px;" alt="${name}">`;
            }

            // 2. 精确匹配 GLOBAL_FLAG_MAP
            const code = GLOBAL_FLAG_MAP[name];
            if (code) {
                return `<img src="https://flagcdn.com/w40/${code}.png" width="24" height="16" style="border-radius:2px;vertical-align:middle;background:#e3f2fd;padding:1px;" alt="${name}">`;
            }

            // 3. 模糊匹配
            for (const [key, val] of Object.entries(GLOBAL_FLAG_MAP)) {
                if (name.includes(key) || key.includes(name)) {
                    // 如果模糊匹配中包含"台北"，依然返回梅花旗
                    if (name.includes("台北") || key.includes("台北")) {
                        return `<img src="${TPE_FLAG}" width="24" height="16" style="border-radius:2px;vertical-align:middle;border:1px solid #eee;background:#e3f2fd;padding:1px;" alt="${name}">`;
                    }
                    return `<img src="https://flagcdn.com/w40/${val}.png" width="24" height="16" style="border-radius:2px;vertical-align:middle;background:#e3f2fd;padding:1px;" alt="${name}">`;
                }
            }
            return '';
        }

        function renderBracket(matches, category) {
            if (!matches || matches.length === 0) {
                document.getElementById('bracket-container').innerHTML = '<div class="bracket-no-data">暂无比赛数据</div>';
                return;
            }

            const eliminationRounds = matches.filter(m => {
                const rn = String(m.roundNumber || '');
                return rn.includes('决') || rn.includes('半') || rn.includes('1/') || rn.includes('四') || !rn.match(/^\d+$/);
            });

            if (eliminationRounds.length === 0) {
                document.getElementById('bracket-container').innerHTML = '<div class="bracket-no-data">暂无淘汰赛数据</div>';
                return;
            }

            const roundOrder = ['决', '半', '四', '1/2', '1/4', '1/8', '1/16'];
            eliminationRounds.sort((a, b) => {
                const ra = String(a.roundNumber || '');
                const rb = String(b.roundNumber || '');
                const ia = roundOrder.findIndex(r => ra.includes(r));
                const ib = roundOrder.findIndex(r => rb.includes(r));
                if (ia !== -1 && ib !== -1) return ia - ib;
                if (ia !== -1) return -1;
                if (ib !== -1) return 1;
                return ra.localeCompare(rb);
            });

            const rounds = {};
            eliminationRounds.forEach(m => {
                const rn = m.roundNumber || '其他';
                if (!rounds[rn]) rounds[rn] = [];
                rounds[rn].push(m);
            });

            Object.keys(rounds).forEach(key => {
                rounds[key].sort((a, b) => (a.id || 0) - (b.id || 0));
            });

            const sortedRoundKeys = Object.keys(rounds).sort((a, b) => {
                const ia = roundOrder.findIndex(r => a.includes(r));
                const ib = roundOrder.findIndex(r => b.includes(r));
                if (ia !== -1 && ib !== -1) return ia - ib;
                if (ia !== -1) return -1;
                if (ib !== -1) return 1;
                return a.localeCompare(b, 'zh');
            });

            console.log('=== 原始数据 ===');
            sortedRoundKeys.forEach(key => {
                console.log(`轮次 ${key} (${rounds[key].length}场):`, rounds[key].map(m => `${m.id}:${m.player1Name} vs ${m.player2Name}`).join(', '));
            });

            for (let i = sortedRoundKeys.length - 2; i >= 0; i--) {
                const currKey = sortedRoundKeys[i];
                const nextKey = sortedRoundKeys[i + 1];
                const currMatches = rounds[currKey];
                const nextMatches = rounds[nextKey];
                
                if (!currMatches || !nextMatches || currMatches.length < 2) continue;
                
                const newOrder = new Array(currMatches.length);
                let used = new Array(currMatches.length).fill(false);
                
                for (let j = 0; j < nextMatches.length; j++) {
                    const nextMatch = nextMatches[j];
                    const p1Name = nextMatch.player1Name;
                    const p2Name = nextMatch.player2Name;
                    
                    let p1Idx = -1, p2Idx = -1;
                    
                    for (let k = 0; k < currMatches.length; k++) {
                        if (used[k]) continue;
                        const m = currMatches[k];
                        if (m.player1Name === p1Name || m.player2Name === p1Name) p1Idx = k;
                        if (m.player1Name === p2Name || m.player2Name === p2Name) p2Idx = k;
                    }
                    
                    if (p1Idx >= 0 && p2Idx >= 0) {
                        newOrder[j * 2] = currMatches[p1Idx];
                        newOrder[j * 2 + 1] = currMatches[p2Idx];
                        used[p1Idx] = true;
                        used[p2Idx] = true;
                    }
                }
                
                let remaining = [];
                for (let k = 0; k < currMatches.length; k++) {
                    if (!used[k]) remaining.push(currMatches[k]);
                }
                let ri = 0;
                for (let k = 0; k < newOrder.length; k++) {
                    if (!newOrder[k] && remaining[ri]) {
                        newOrder[k] = remaining[ri++];
                    }
                }
                
                rounds[currKey] = newOrder.filter(m => m);
            }

            console.log('=== 重排后数据 ===');
            Object.keys(rounds).forEach(key => {
                console.log(`轮次 ${key} (${rounds[key].length}场):`, rounds[key].map(m => `${m.id}:${m.player1Name} vs ${m.player2Name}`).join(', '));
            });

            const sortedRoundKeysFinal = Object.keys(rounds).sort((a, b) => {
                const ia = roundOrder.findIndex(r => a.includes(r));
                const ib = roundOrder.findIndex(r => b.includes(r));
                if (ia !== -1 && ib !== -1) return ia - ib;
                if (ia !== -1) return -1;
                if (ib !== -1) return 1;
                return a.localeCompare(b, 'zh');
            });

            const roundCount = sortedRoundKeysFinal.length;
            const matchBoxWidth = 150;
            const matchBoxHeight = 45;
            const roundGap = 80;
            const padding = 30;
            const headerHeight = 30;
            const baseSpacing = 60;

            const maxMatches = rounds[sortedRoundKeysFinal[0]].length;
            const svgHeight = padding * 2 + headerHeight + maxMatches * baseSpacing + 30;
            const svgWidth = padding * 2 + roundCount * (matchBoxWidth + roundGap);

            const roundPositions = {};
            
            for (let roundIdx = 0; roundIdx < roundCount; roundIdx++) {
                const key = sortedRoundKeysFinal[roundIdx];
                const roundMatches = rounds[key];
                const matchesInRound = roundMatches.length;
                const unit = maxMatches / matchesInRound;
                
                roundPositions[key] = [];
                roundMatches.forEach((m, matchIdx) => {
                    const unitHeight = maxMatches * baseSpacing / matchesInRound;
                    const y = padding + headerHeight + matchIdx * unitHeight + (unitHeight - matchBoxHeight) / 2;
                    
                    roundPositions[key].push({
                        match: m,
                        x: padding + roundIdx * (matchBoxWidth + roundGap),
                        y: y
                    });
                });
            }

            let svg = `<svg class="bracket-svg" width="${svgWidth}" height="${svgHeight}" xmlns="http://www.w3.org/2000/svg">`;

            svg += `<text x="${svgWidth/2}" y="18" text-anchor="middle" class="bracket-round-label" style="font-size:13px;font-weight:700;">${category}</text>`;

            sortedRoundKeysFinal.forEach((key, roundIdx) => {
                const roundLabel = key;
                const roundX = padding + roundIdx * (matchBoxWidth + roundGap) + matchBoxWidth / 2;
                svg += `<text x="${roundX}" y="${headerHeight - 2}" text-anchor="middle" class="bracket-round-label" style="font-size:9px;font-weight:600;fill:#0077b6;">${roundLabel}</text>`;
            });

            for (let r = 0; r < sortedRoundKeysFinal.length - 1; r++) {
                const currentKey = sortedRoundKeysFinal[r];
                const nextKey = sortedRoundKeysFinal[r + 1];
                const currentPos = roundPositions[currentKey];
                const nextPos = roundPositions[nextKey];

                for (let i = 0; i < currentPos.length; i++) {
                    const match = currentPos[i];
                    const matchIdx = Math.floor(i / 2);
                    const targetMatch = nextPos[matchIdx];
                    if (!targetMatch) continue;

                    const y1 = match.y + matchBoxHeight / 2;
                    const y2 = targetMatch.y + matchBoxHeight / 2;
                    const x1 = match.x + matchBoxWidth;
                    const x2 = targetMatch.x;
                    const midX = (x1 + x2) / 2;

                    svg += `<line x1="${x1}" y1="${y1}" x2="${midX}" y2="${y1}" stroke="#0077b6" stroke-width="1.5"/>`;
                    svg += `<line x1="${midX}" y1="${y1}" x2="${midX}" y2="${y2}" stroke="#0077b6" stroke-width="1.5"/>`;
                    svg += `<line x1="${midX}" y1="${y2}" x2="${x2}" y2="${y2}" stroke="#0077b6" stroke-width="1.5"/>`;
                }
            }

            sortedRoundKeysFinal.forEach(key => {
                roundPositions[key].forEach(pos => {
                    const m = pos.match;
                    const p1 = m.player1Name || '';
                    const p2 = m.player2Name || '';

                    let p1Score = m.player1Total || 0;
                    let p2Score = m.player2Total || 0;
                    
                    if (!p1Score && !p2Score) {
                        try {
                            if (m.scores) {
                                const scores = JSON.parse(m.scores);
                                scores.forEach(s => {
                                    if (s.p1 > s.p2) p1Score++;
                                    else if (s.p2 > s.p1) p2Score++;
                                });
                            }
                        } catch (e) {}
                    }

                    const p1Class = p1Score > p2Score && p1Score > 0 ? 'bracket-player-name--winner' : (p1 ? '' : 'bracket-player-name--empty');
                    const p2Class = p2Score > p1Score && p2Score > 0 ? 'bracket-player-name--winner' : (p2 ? '' : 'bracket-player-name--empty');
                    
                    const truncateName = (name, maxLen) => {
                        if (!name) return '待定';
                        return name.length > maxLen ? name.substring(0, maxLen - 1) + '…' : name;
                    };
                    
                    const p1Display = truncateName(p1, 12);
                    const p2Display = truncateName(p2, 12);
                    const scoreText = (p1Score > 0 || p2Score > 0) ? `${p1Score} - ${p2Score}` : '';

                    svg += `<rect x="${pos.x}" y="${pos.y}" width="${matchBoxWidth}" height="${matchBoxHeight}" rx="6" class="bracket-match-box"/>`;
                    svg += `<line x1="${pos.x}" y1="${pos.y + matchBoxHeight/2}" x2="${pos.x + matchBoxWidth}" y2="${pos.y + matchBoxHeight/2}" class="bracket-divider"/>`;
                    svg += `<text x="${pos.x + 6}" y="${pos.y + 16}" class="bracket-player-name ${p1Class}" font-size="10">${p1Display}</text>`;
                    svg += `<text x="${pos.x + matchBoxWidth - 6}" y="${pos.y + 16}" class="bracket-player-name ${p1Class}" text-anchor="end" font-size="10">${p1Score}</text>`;
                    svg += `<text x="${pos.x + 6}" y="${pos.y + 32}" class="bracket-player-name ${p2Class}" font-size="10">${p2Display}</text>`;
                    svg += `<text x="${pos.x + matchBoxWidth - 6}" y="${pos.y + 32}" class="bracket-player-name ${p2Class}" text-anchor="end" font-size="10">${p2Score}</text>`;
                });
            });

            svg += '</svg>';
            document.getElementById('bracket-container').innerHTML = svg;
        }

        async function showPlayerDetail(id) {
            currentPlayerId = id;
            try {
                const res = await fetch(`${API_BASE}/players/${id}`);
                const p = await res.json();

                document.getElementById('detail-avatar').textContent = p.name.charAt(0);
                document.getElementById('detail-name').textContent = p.name;
                document.getElementById('detail-country').textContent = p.country || '-';
                let introHtml = p.introduction || '暂无简介';

                function parseMarkdown(text) {
                    if (!text) return text;
                    let html = text;
                    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
                    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
                    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
                    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                    html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
                    html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
                    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
                    html = html.replace(/^---$/gm, '<hr>');

                    const tableRegex = /(\|.+\|\n)+/g;
                    html = html.replace(tableRegex, (match) => {
                        const rows = match.trim().split('\n').filter(row => !row.match(/^\|[\s\-:|]+\|$/));
                        if (rows.length === 0) return match;
                        let tableHtml = '<table>';
                        rows.forEach((row, idx) => {
                            const cells = row.split('|').filter(c => c.trim());
                            if (cells.length > 0) {
                                const tag = idx === 0 ? 'th' : 'td';
                                const cellsHtml = cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('');
                                tableHtml += `<tr>${cellsHtml}</tr>`;
                            }
                        });
                        tableHtml += '</table>';
                        return tableHtml;
                    });

                    html = html.replace(/\n\n/g, '</p><p>');
                    html = '<p>' + html + '</p>';
                    html = html.replace(/<p><\/p>/g, '');
                    return html;
                }

                try {
                    const m = window.marked;
                    if (m && typeof m.parse === 'function') {
                        const parsed = m.parse(introHtml);
                        introHtml = parsed instanceof Promise ? await parsed : parsed;
                    } else {
                        introHtml = parseMarkdown(introHtml);
                    }
                } catch (e) {
                    introHtml = parseMarkdown(introHtml);
                }
                document.getElementById('detail-intro').innerHTML = introHtml;
                document.getElementById('detail-age').textContent = p.age || '-';
                document.getElementById('detail-gender').textContent = p.gender || '-';
                document.getElementById('detail-points').textContent = p.rankingPoints || 0;

                const rankRes = await fetch(`${API_BASE}/players/ranking`);

            } catch (e) {

            }
        }

        function filterCompetitions() {
            const selectedYear = document.getElementById('competition-year-select').value;
            let filtered = allCompetitions;

            if (selectedYear) {
                filtered = allCompetitions.filter(c => c.competitionYear == selectedYear);
            }

            // 按年份降序排序（从高到低）
            filtered.sort((a, b) => (b.competitionYear || 0) - (a.competitionYear || 0));

            // 按年份分组显示
            const grouped = {};
            filtered.forEach(c => {
                const year = c.competitionYear || '未知年份';
                if (!grouped[year]) grouped[year] = [];
                grouped[year].push(c);
            });

            let html = '';
            Object.keys(grouped).sort((a, b) => b - a).forEach(year => {
                // 每年份内按开始日期降序（最近的最先）
                grouped[year].sort((a, b) => {
                    const dateA = a.startDate ? new Date(a.startDate).getTime() : 0;
                    const dateB = b.startDate ? new Date(b.startDate).getTime() : 0;
                    return dateB - dateA;
                });
                
                html += `<h4 style="margin: 20px 0 10px; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 5px;">${year}年</h4>`;

            const thirdNames = Array.isArray(r.thirdPlaces) ? r.thirdPlaces : [r.thirdPlace].filter(Boolean);
            const third3Label = thirdNames.length > 1 ? '季军(并列)' : '季军';

            let thirdContent = '';

        function getMedalWinnersWithFlags(matches, category) {
            const base = getMedalWinners(matches, category);
            if (!base) return null;
            const matchByName = {};
            matches.forEach(m => {
                if (m.player1Name) matchByName[m.player1Name] = m.player1Country || '';
                if (m.player2Name) matchByName[m.player2Name] = m.player2Country || '';
            });
            const thirdCountries = Array.isArray(base.thirdPlaces)
                ? base.thirdPlaces.map(name => matchByName[name] || '')
                : [(matchByName[base.thirdPlace] || '')];
            return {
                ...base,
                championCountry: matchByName[base.champion] || '',
                runnerUpCountry: matchByName[base.runnerUp] || '',
                thirdCountries: thirdCountries
            };
        }

        function getMedalWinners(matches, category) {
            console.log('=== getMedalWinners called ===');
            console.log('All matches:', matches.map(m => ({ id: m.id, round: m.roundNumber, status: m.status, p1: m.player1Name })));

            // 只处理已完成比赛（兼容多种状态值）
            const completedMatches = matches.filter(m => {
                const status = (m.status || '').toLowerCase();
                return status === 'completed' || status === 'finished' || status === '已完成' || status === '已结束';
            });

            console.log('All matches:', matches.map(m => ({ id: m.id, round: m.roundNumber, status: m.status, p1: m.player1Name })));
            console.log('Completed matches:', completedMatches.map(m => ({ id: m.id, round: m.roundNumber, p1: m.player1Name })));

            if (completedMatches.length === 0) return null;

            // 找决赛（必须包含"决赛"或"Final"，且不是1/Xx决赛格式）
            const allFinals = completedMatches.filter(m => {
                const r = m.roundNumber || '';
                const isFinal = (r.includes('决赛') || r.toLowerCase().includes('final'))
                    && !/1\/\d+决赛/.test(r) && !r.includes('半');
                return isFinal;
            });

            // 按日期排序，取最晚的决赛
            allFinals.sort((a, b) => new Date(b.matchDate || 0) - new Date(a.matchDate || 0));

            const finalMatch = allFinals.length > 0 ? allFinals[0] : null;

            console.log('Final match:', finalMatch ? { id: finalMatch.id, p1: finalMatch.player1Name, p2: finalMatch.player2Name } : 'none');

            // 没有决赛，不显示冠亚季军
            if (!finalMatch) {
                console.log('No final match, returning null');
                return null;
            }

            let champion = null;
            let runnerUp = null;
            let thirdPlace = null;
            let thirdPlaces = [];

            // 计算总分
            let p1Total = finalMatch.player1Total || 0;
            let p2Total = finalMatch.player2Total || 0;

            // 从scores计算
            if ((p1Total === 0 && p2Total === 0) && finalMatch.scores) {
                try {
                    const scores = JSON.parse(finalMatch.scores);
                    scores.forEach(s => {
                        if (s.p1 > s.p2) p1Total++;
                        else if (s.p2 > s.p1) p2Total++;
                    });
                } catch (e) { }
            }

            console.log('Final scores:', p1Total, p2Total);

            if (p1Total > p2Total) {
                champion = finalMatch.player1Name;
                runnerUp = finalMatch.player2Name;
            } else if (p2Total > p1Total) {
                champion = finalMatch.player2Name;
                runnerUp = finalMatch.player1Name;
            } else {
                console.log('Final match is a tie, cannot determine champion');
                return null;
            }

            console.log('Champion:', champion, 'Runner up:', runnerUp);

            // 查找所有半决（用于确定季军）- 支持多种格式
            console.log('===== DEBUG: All completed matches roundNumbers =====');
            completedMatches.forEach(m => {
                console.log(`Match ${m.id}: roundNumber="${m.roundNumber}", p1=${m.player1Name}, p2=${m.player2Name}`);
            });

            const semiFinals = completedMatches.filter(m => {
                const r = m.roundNumber || '';
                const isSemi = r.includes('半') || r.toLowerCase().includes('semi') || r.includes('准决') || r.includes('4强') || r.includes('半决赛') || r.includes('初赛');
                console.log('Checking match for semi:', m.id, m.roundNumber, 'isSemi:', isSemi);
                return isSemi;
            });

            console.log('===== Semi-finals found:', semiFinals.length);
            semiFinals.forEach((semi, i) => {
                console.log(`Semi ${i + 1}:`, { p1: semi.player1Name, p2: semi.player2Name, scores: semi.scores });
            });

            console.log('===== Processing semi-finals for third places =====');

            // 铜牌赛
            const bronzeMatch = completedMatches.find(m => (m.roundNumber || '').includes('铜牌'));

            if (bronzeMatch) {
                let bP1Total = bronzeMatch.player1Total || 0;
                let bP2Total = bronzeMatch.player2Total || 0;

                if ((bP1Total === 0 && bP2Total === 0) && bronzeMatch.scores) {
                    try {
                        const scores = JSON.parse(bronzeMatch.scores);
                        scores.forEach(s => {
                            if (s.p1 > s.p2) bP1Total++;
                            else if (s.p2 > s.p1) bP2Total++;
                        });
                    } catch (e) { }
                }

                if (bP1Total > bP2Total) {
                    thirdPlace = bronzeMatch.player1Name;
                    thirdPlaces = [bronzeMatch.player1Name];
                } else if (bP2Total > bP1Total) {
                    thirdPlace = bronzeMatch.player2Name;
                    thirdPlaces = [bronzeMatch.player2Name];
                }
            } else if (semiFinals.length > 0) {
                console.log('===== Processing', semiFinals.length, 'semifinals for third places');
                // 没有铜牌赛时，使用所有半决输的两队作为季军
                for (const semi of semiFinals) {
                    let sP1Total = 0;
                    let sP2Total = 0;

                    // 从scores计算总分
                    if (semi.scores) {
                        try {
                            const scores = JSON.parse(semi.scores);
                            console.log('Semi scores:', semi.player1Name, 'vs', semi.player2Name, scores);
                            scores.forEach(s => {
                                if (s.p1 > s.p2) sP1Total++;
                                else if (s.p2 > s.p1) sP2Total++;
                            });
                            console.log('Semi totals:', sP1Total, 'vs', sP2Total);
                        } catch (e) { }
                    }

                    console.log('Semi match:', semi.player1Name, sP1Total, 'vs', semi.player2Name, sP2Total);
                    console.log('Winner is:', sP1Total > sP2Total ? semi.player1Name : (sP2Total > sP1Total ? semi.player2Name : 'tie'));

                    console.log('===== DEBUG: Adding third place =====');
                    console.log('Condition 1 (player1 wins): sP1Total=' + sP1Total + ', sP2Total=' + sP2Total + ', result=' + (sP1Total > sP2Total && sP1Total > 0));
                    console.log('Condition 2 (player2 wins): sP2Total=' + sP2Total + ', sP1Total=' + sP1Total + ', result=' + (sP2Total > sP1Total && sP2Total > 0));

                    // 输的一方加入季军列表（忽略0-0的比分）
                    if (sP1Total > sP2Total && sP1Total > 0) {
                        console.log('Adding loser (player2 won):', semi.player2Name);
                        if (!thirdPlaces.includes(semi.player2Name)) {
                            thirdPlaces.push(semi.player2Name);
                            console.log('Added third place:', semi.player2Name);
                        }
                    }
                    if (sP2Total > sP1Total && sP2Total > 0) {
                        console.log('Adding loser (player1 won):', semi.player1Name);
                        if (!thirdPlaces.includes(semi.player1Name)) {
                            thirdPlaces.push(semi.player1Name);
                            console.log('Added third place:', semi.player1Name);
                        }
                    }
                }
            }

            console.log('===== Final thirdPlaces array:', thirdPlaces);

            console.log('Third place:', thirdPlace);
            console.log('Third places (array):', thirdPlaces);

            if (!champion) return null;

            const result = {
                champion: champion || '-',
                runnerUp: runnerUp || '-',
                thirdPlace: thirdPlace || '-',
                thirdPlaces: thirdPlaces.length > 0 ? thirdPlaces : null,
                _debug: {
                    semiFinalsCount: semiFinals.length,
                    semiFinals: semiFinals.map(s => ({ id: s.id, round: s.roundNumber, p1: s.player1Name, p2: s.player2Name })),
                    thirdPlacesRaw: thirdPlaces
                }
            };
            console.log('===== FINAL RESULT:', result);
            return result;
        }

        function getRoundOrder(roundNumber) {
            if (!roundNumber) return 999;
            if (roundNumber.includes('决赛') || roundNumber.includes('Final')) return 1;
            if (roundNumber.includes('半决') || roundNumber.includes('Semi')) return 2;
            if (roundNumber.includes('1/4') || roundNumber.includes('Quarter')) return 3;
            if (roundNumber.includes('1/8') || roundNumber.includes('1/8')) return 4;
            return 5;
        }

                    document.getElementById('announcement-content').value = a.content || '';
                    document.getElementById('announcement-published').checked = a.isPublished !== false;
                });
            }
        }

        async function editAnnouncement(id) { showAnnouncementModal(id); }

        async function deleteAnnouncement(id) {
            if (confirm('确定要删除这条公告吗？')) {
                await fetch(`${API_BASE}/announcements/${id}`, { method: 'DELETE' });
                showHome();
            }
        }

        document.getElementById('announcement-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const id = document.getElementById('announcement-id').value;
            const announcement = {
                title: document.getElementById('announcement-title').value,
                type: document.getElementById('announcement-type').value,
                content: document.getElementById('announcement-content').value,
                isPublished: document.getElementById('announcement-published').checked
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_BASE}/announcements/${id}` : `${API_BASE}/announcements`;

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(announcement)
            });

            closeModal('announcement-modal');
            if (currentAnnouncementId) {
                showAnnouncementDetail(currentAnnouncementId);
            } else {
                showHome();
            }
        });

        function toggleMatchDetail(matchId) {
            const detailDiv = document.getElementById('match-detail-' + matchId);
            if (detailDiv) {
                detailDiv.style.display = detailDiv.style.display === 'none' ? 'block' : 'none';
            }
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            const date = d.toLocaleDateString();
            const time = d.toTimeString().slice(0, 5);
            return `${date} ${time}`;
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        // 等 DOM 加载完成后再初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadHomeData);
        } else {
            loadHomeData();
        }
    </script>
</body>

</html>
