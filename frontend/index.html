        function renderBracket(matches, category) {
            if (!matches || matches.length === 0) {
                document.getElementById('bracket-container').innerHTML = '<div class="bracket-no-data">暂无比赛数据</div>';
                return;
            }

            const isTeamCategory = category && category.includes('团');
            const eliminationRounds = matches.filter(m => {
                const rn = String(m.roundNumber || '');
                if (!rn || rn.trim() === '') return currentBracketPhase === 'main';
                if (rn.includes('小组')) return false;
                if (rn.includes('组')) return false;
                var isQualify = rn.includes('资格');
                if (currentBracketPhase === 'qualify') return isQualify;
                return !isQualify;
            });

            if (eliminationRounds.length === 0) {
                document.getElementById('bracket-container').innerHTML = '<div class="bracket-no-data">暂无淘汰赛数据</div>';
                return;
            }

            const roundOrder = ['资格赛决赛', '资格赛', '1/128', '1/64', '1/32', '1/16', '1/8', '1/4', '四分之一', '半决', '半决赛'];
            eliminationRounds.sort((a, b) => {
                const ra = String(a.roundNumber || '');
                const rb = String(b.roundNumber || '');
                const isBronzeA = ra.includes('铜');
                const isBronzeB = rb.includes('铜');
                const isFinalA = ra.includes('决');
                const isFinalB = rb.includes('决');
                if (isBronzeA && isFinalB) return 1;
                if (isBronzeB && isFinalA) return -1;
                const ia = roundOrder.findIndex(r => ra.includes(r));
                const ib = roundOrder.findIndex(r => rb.includes(r));
                if (ia !== -1 && ib !== -1) return ia - ib;
                if (ia !== -1) return -1;
                if (ib !== -1) return 1;
                return ra.localeCompare(rb);
            });

            const rounds = {};
            eliminationRounds.forEach(m => {
                let rn = m.roundNumber || '其他';
                if (rn.includes('铜')) rn = '决赛';
                if (!rounds[rn]) rounds[rn] = [];
                rounds[rn].push(m);
            });

            Object.keys(rounds).forEach(key => {
                rounds[key].sort((a, b) => (a.id || 0) - (b.id || 0));
            });

            const sortedRoundKeys = Object.keys(rounds).sort((a, b) => {
                const isBronzeA = a.includes('铜');
                const isBronzeB = b.includes('铜');
                const isFinalA = a.includes('决');
                const isFinalB = b.includes('决');
                if (isBronzeA && isFinalB) return 1;
                if (isBronzeB && isFinalA) return -1;
                const ia = roundOrder.findIndex(r => a.includes(r));
                const ib = roundOrder.findIndex(r => b.includes(r));
                if (ia !== -1 && ib !== -1) return ia - ib;
                if (ia !== -1) return -1;
                if (ib !== -1) return 1;
                return a.localeCompare(b, 'zh');
            });

            console.log('=== 原始数据 ===');
            sortedRoundKeys.forEach(key => {
                console.log(`轮次 ${key} (${rounds[key].length}场):`, rounds[key].map(m => `${m.id}:${m.player1Name} vs ${m.player2Name}`).join(', '));
            });

            // 按ID排序
            Object.keys(rounds).forEach(key => {
                rounds[key].sort((a, b) => (a.id || 0) - (b.id || 0));
            });

            function nameEq(n1, n2) {
                if (!n1 || !n2) return false;
                const a = String(n1).replace(/[·.]/g, '.').replace(/[Ａ-Ｚａ-ｚ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).trim();
                const b = String(n2).replace(/[·.]/g, '.').replace(/[Ａ-Ｚａ-ｚ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).trim();
                return a === b || a.includes(b) || b.includes(a);
            }

            // 对所有轮次从后向前重排
            for (let roundIdx = sortedRoundKeys.length - 1; roundIdx > 0; roundIdx--) {
                const currKey = sortedRoundKeys[roundIdx];
                const prevKey = sortedRoundKeys[roundIdx - 1];
                const currMatches = rounds[currKey];
                const prevMatches = rounds[prevKey];

                if (!currMatches || !prevMatches || currMatches.length < 1) continue;

                const newOrder = [];
                const used = new Set();

                for (let i = 0; i < currMatches.length; i++) {
                    const p1 = currMatches[i].player1Name;
                    const p2 = currMatches[i].player2Name;

                    const matched = [];
                    for (let k = 0; k < prevMatches.length; k++) {
                        if (used.has(k)) continue;
                        const m = prevMatches[k];
                        if (nameEq(m.player1Name, p1) || nameEq(m.player2Name, p1) ||
                            nameEq(m.player1Name, p2) || nameEq(m.player2Name, p2)) {
                            matched.push({ m, k });
                        }
                    }

                    if (matched.length >= 2) {
                        newOrder.push(matched[0].m);
                        newOrder.push(matched[1].m);
                        used.add(matched[0].k);
                        used.add(matched[1].k);
                    } else if (matched.length === 1) {
                        newOrder.push(matched[0].m);
                        used.add(matched[0].k);
                    }
                }

                for (let k = 0; k < prevMatches.length; k++) {
                    if (!used.has(k)) newOrder.push(prevMatches[k]);
                }

                rounds[prevKey] = newOrder;
            }

            // 其他轮次按正常逻辑重排
            for (let i = sortedRoundKeys.length - 2; i >= 0; i--) {
                const currKey = sortedRoundKeys[i];
                const nextKey = sortedRoundKeys[i + 1];

                if (currKey.includes('1/32')) continue;

                const currMatches = rounds[currKey];
                const nextMatches = rounds[nextKey];

                if (!currMatches || !nextMatches || currMatches.length < 2) continue;

                const newOrder = [];
                const used = new Set();

                for (let j = 0; j < nextMatches.length; j++) {
                    const nextMatch = nextMatches[j];
                    const p1 = nextMatch.player1Name;
                    const p2 = nextMatch.player2Name;

                    const matched = [];
                    for (let k = 0; k < currMatches.length; k++) {
                        if (used.has(k)) continue;
                        const m = currMatches[k];
                        if (nameEq(m.player1Name, p1) || nameEq(m.player2Name, p1) ||
                            nameEq(m.player1Name, p2) || nameEq(m.player2Name, p2)) {
                            matched.push({ m, k });
                        }
                    }

                    if (matched.length >= 2) {
                        newOrder.push(matched[0].m);
                        newOrder.push(matched[1].m);
                        used.add(matched[0].k);
                        used.add(matched[1].k);
                    }
                }

                for (let k = 0; k < currMatches.length; k++) {
                    if (!used.has(k)) newOrder.push(currMatches[k]);
                }

                rounds[currKey] = newOrder;
            }

            console.log('=== 重排后数据 ===');

            const sortedRoundKeysFinal = Object.keys(rounds).sort((a, b) => {
                const isBronzeA = a.includes('铜');
                const isBronzeB = b.includes('铜');
                const isFinalA = a.includes('决');
                const isFinalB = b.includes('决');
                if (isBronzeA && isFinalB) return 1;
                if (isBronzeB && isFinalA) return -1;
                const ia = roundOrder.findIndex(r => a.includes(r));
                const ib = roundOrder.findIndex(r => b.includes(r));
                if (ia !== -1 && ib !== -1) return ia - ib;
                if (ia !== -1) return -1;
                if (ib !== -1) return 1;
                return a.localeCompare(b, 'zh');
            });

            const roundCount = sortedRoundKeysFinal.length;
            const matchBoxWidth = 150;
            const matchBoxHeight = 45;
            const roundGap = 80;
            const padding = 30;
            const headerHeight = 30;
            const baseSpacing = 60;

            const maxMatches = rounds[sortedRoundKeysFinal[0]].length;
            const svgHeight = padding * 2 + headerHeight + maxMatches * baseSpacing + 30;
            const svgWidth = padding * 2 + roundCount * (matchBoxWidth + roundGap);

            const roundPositions = {};

            for (let roundIdx = 0; roundIdx < roundCount; roundIdx++) {
                const key = sortedRoundKeysFinal[roundIdx];
                const roundMatches = rounds[key];
                const matchesInRound = roundMatches.length;
                const unit = maxMatches / matchesInRound;

                roundPositions[key] = [];
                roundMatches.forEach((m, matchIdx) => {
                    const unitHeight = maxMatches * baseSpacing / matchesInRound;
                    const y = padding + headerHeight + matchIdx * unitHeight + (unitHeight - matchBoxHeight) / 2;

                    roundPositions[key].push({
                        match: m,
                        x: padding + roundIdx * (matchBoxWidth + roundGap),
                        y: y
                    });
                });
            }

            let svg = `<svg class="bracket-svg" width="${svgWidth}" height="${svgHeight}" xmlns="http://www.w3.org/2000/svg">`;

            svg += `<text x="${svgWidth / 2}" y="18" text-anchor="middle" class="bracket-round-label" style="font-size:13px;font-weight:700;">${category}</text>`;

            sortedRoundKeysFinal.forEach((key, roundIdx) => {
                const roundLabel = key;
                const roundX = padding + roundIdx * (matchBoxWidth + roundGap) + matchBoxWidth / 2;
                svg += `<text x="${roundX}" y="${headerHeight - 2}" text-anchor="middle" class="bracket-round-label" style="font-size:9px;font-weight:600;fill:#0077b6;">${roundLabel}</text>`;
            });

            function namesMatchForLine(name1, name2) {
                if (!name1 || !name2) return false;
                const n1 = String(name1).replace(/[·.]/g, '.').replace(/[Ａ-Ｚａ-ｚ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, '').trim();
                const n2 = String(name2).replace(/[·.]/g, '.').replace(/[Ａ-Ｚａ-ｚ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, '').trim();
                return n1 === n2 || n1.includes(n2) || n2.includes(n1);
            }

            for (let r = 0; r < sortedRoundKeysFinal.length - 1; r++) {
                const currentKey = sortedRoundKeysFinal[r];
                const nextKey = sortedRoundKeysFinal[r + 1];
                const currentPos = roundPositions[currentKey];
                const nextPos = roundPositions[nextKey];

                if (currentKey.includes('小组赛') || nextKey.includes('小组赛')) continue;

                for (let i = 0; i < currentPos.length; i++) {
                    const match = currentPos[i];
                    let targetMatch;

                    const p1Name = match.match.player1Name;
                    const p2Name = match.match.player2Name;
                    const p1Total = match.match.player1Total || 0;
                    const p2Total = match.match.player2Total || 0;

                    // 检查是否轮空（对手为空或为"轮空"）
                    const isP1Bye = !p1Name || p1Name === '轮空' || p1Name === 'BYE' || p1Name === '待定';
                    const isP2Bye = !p2Name || p2Name === '轮空' || p2Name === 'BYE' || p2Name === '待定';

                    // 确定晋级选手
                    let winnerName = null;
                    if (isP1Bye && !isP2Bye) {
                        winnerName = p2Name; // p2直接晋级
                    } else if (isP2Bye && !isP1Bye) {
                        winnerName = p1Name; // p1直接晋级
                    } else if (p1Total > p2Total) {
                        winnerName = p1Name;
                    } else if (p2Total > p1Total) {
                        winnerName = p2Name;
                    }

                    if (winnerName) {
                        for (let j = 0; j < nextPos.length; j++) {
                            const nm = nextPos[j].match;
                            if (namesMatchForLine(nm.player1Name, winnerName) || namesMatchForLine(nm.player2Name, winnerName)) {
                                targetMatch = nextPos[j];
                                break;
                            }
                        }
                    }

                    if (!targetMatch) {
                        continue;
                    }

                    const y1 = match.y + matchBoxHeight / 2;
                    const y2 = targetMatch.y + matchBoxHeight / 2;
                    const x1 = match.x + matchBoxWidth;
                    const x2 = targetMatch.x;
                    const midX = (x1 + x2) / 2;

                    svg += `<line x1="${x1}" y1="${y1}" x2="${midX}" y2="${y1}" stroke="#0077b6" stroke-width="1.5"/>`;
                    svg += `<line x1="${midX}" y1="${y1}" x2="${midX}" y2="${y2}" stroke="#0077b6" stroke-width="1.5"/>`;
                    svg += `<line x1="${midX}" y1="${y2}" x2="${x2}" y2="${y2}" stroke="#0077b6" stroke-width="1.5"/>`;
                }
            }

            sortedRoundKeysFinal.forEach(key => {
                roundPositions[key].forEach(pos => {
                    const m = pos.match;
                    const isTeam = category && category.includes('团');
                    const p1 = isTeam ? (m.player1Country || m.player1Name || '') : (m.player1Name || '');
                    const p2 = isTeam ? (m.player2Country || m.player2Name || '') : (m.player2Name || '');

                    const matchDateStr = m.matchDate ? new Date(m.matchDate).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';

                    let p1Score = m.player1Total || 0;
                    let p2Score = m.player2Total || 0;

                    if (!p1Score && !p2Score) {
                        try {
                            if (m.scores) {
                                const scores = JSON.parse(m.scores);
                                scores.forEach(s => {
                                    if (s.p1 > s.p2) p1Score++;
                                    else if (s.p2 > s.p1) p2Score++;
                                });
                            }
                        } catch (e) { }
                    }

                    const p1Class = p1Score > p2Score && p1Score > 0 ? 'bracket-player-name--winner' : (p1 ? '' : 'bracket-player-name--empty');
                    const p2Class = p2Score > p1Score && p2Score > 0 ? 'bracket-player-name--winner' : (p2 ? '' : 'bracket-player-name--empty');

                    const truncateName = (name, maxLen) => {
                        if (!name) return '待定';
                        return name.length > maxLen ? name.substring(0, maxLen - 1) + '…' : name;
                    };

                    const p1Display = truncateName(p1, 10);
                    const p2Display = truncateName(p2, 10);
                    const p1TitleEl = p1.length > 10 ? `<title>${p1}</title>` : '';
                    const p2TitleEl = p2.length > 10 ? `<title>${p2}</title>` : '';
                    const scoreText = (p1Score > 0 || p2Score > 0) ? `${p1Score} - ${p2Score}` : '';

                    svg += `<rect x="${pos.x}" y="${pos.y}" width="${matchBoxWidth}" height="${matchBoxHeight}" rx="6" class="bracket-match-box"/>`;
                    svg += `<line x1="${pos.x}" y1="${pos.y + matchBoxHeight / 2}" x2="${pos.x + matchBoxWidth}" y2="${pos.y + matchBoxHeight / 2}" class="bracket-divider"/>`;
                    svg += `<g>${p1TitleEl}<text x="${pos.x + 8}" y="${pos.y + 14}" class="bracket-player-name ${p1Class}" font-size="10">${p1Display}</text></g>`;
                    svg += `<text x="${pos.x + matchBoxWidth - 8}" y="${pos.y + 14}" class="bracket-player-name ${p1Class}" text-anchor="end" font-size="10">${p1Score}</text>`;
                    svg += `<g>${p2TitleEl}<text x="${pos.x + 8}" y="${pos.y + 34}" class="bracket-player-name ${p2Class}" font-size="10">${p2Display}</text></g>`;
                    svg += `<text x="${pos.x + matchBoxWidth - 8}" y="${pos.y + 34}" class="bracket-player-name ${p2Class}" text-anchor="end" font-size="10">${p2Score}</text>`;
                    if (matchDateStr) {
                        svg += `<text x="${pos.x + 8}" y="${pos.y + matchBoxHeight + 10}" font-size="9" fill="#e53935" font-weight="700">${matchDateStr}</text>`;
                    }
                });
            });

            svg += '</svg>';
            document.getElementById('bracket-container').innerHTML = svg;
        }

        async function showPlayerDetail(id) {
            currentPlayerId = id;
            try {
                const res = await fetch(`${API_BASE}/players/${id}`);
                const p = await res.json();

                document.getElementById('detail-avatar').textContent = p.name.charAt(0);
                document.getElementById('detail-name').textContent = p.name;
                document.getElementById('detail-country').innerHTML = getFlag(p.country) || (p.country || '-');
                let introHtml = p.introduction || '暂无简介';

                function parseMarkdown(text) {
                    if (!text) return text;
                    let html = text;
                    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
                    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
                    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
                    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                    html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
                    html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
                    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
                    html = html.replace(/^---$/gm, '<hr>');

                    const tableRegex = /(\|.+\|\n)+/g;
                    html = html.replace(tableRegex, (match) => {
                        const rows = match.trim().split('\n').filter(row => !row.match(/^\|[\s\-:|]+\|$/));
                        if (rows.length === 0) return match;
                        let tableHtml = '<table>';
                        rows.forEach((row, idx) => {
                            const cells = row.split('|').filter(c => c.trim());
                            if (cells.length > 0) {
                                const tag = idx === 0 ? 'th' : 'td';
                                const cellsHtml = cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('');
                                tableHtml += `<tr>${cellsHtml}</tr>`;
                            }
                        });
                        tableHtml += '</table>';
                        return tableHtml;
                    });

                    html = html.replace(/\n\n/g, '</p><p>');
                    html = '<p>' + html + '</p>';
                    html = html.replace(/<p><\/p>/g, '');
                    return html;
                }

                try {
                    const m = window.marked;
                    if (m && typeof m.parse === 'function') {
                        const parsed = m.parse(introHtml);
                        introHtml = parsed instanceof Promise ? await parsed : parsed;
                    } else {
                        introHtml = parseMarkdown(introHtml);
                    }
                } catch (e) {
                    introHtml = parseMarkdown(introHtml);
                }
                document.getElementById('detail-intro').innerHTML = introHtml;
                document.getElementById('detail-age').textContent = p.age || '-';
                document.getElementById('detail-gender').textContent = p.gender || '-';
                document.getElementById('detail-points').textContent = p.rankingPoints || 0;

                const rankRes = await fetch(`${API_BASE}/players/ranking`);
                const ranking = await rankRes.json();
                const rank = ranking.findIndex(r => r.id === id) + 1;
                document.getElementById('detail-rank').textContent = rank || '-';

                document.getElementById('players-list-view').style.display = 'none';
                document.getElementById('player-detail-view').style.display = 'block';
            } catch (e) {
                console.error(e);
            }
        }

        function filterCompetitions() {
            const selectedYear = document.getElementById('competition-year-select').value;
            const selectedMonth = document.getElementById('competition-month-select').value;
            let filtered = allCompetitions;

            if (selectedYear) {
                filtered = filtered.filter(c => c.competitionYear == selectedYear);
            }

            if (selectedMonth) {
                filtered = filtered.filter(c => {
                    if (!c.startDate) return false;
                    const month = new Date(c.startDate).getMonth() + 1;
                    return month == selectedMonth;
                });
            }

            // 按年份降序排序（从高到低）
            filtered.sort((a, b) => (b.competitionYear || 0) - (a.competitionYear || 0));

            // 按年份分组显示
            const yearGrouped = {};
            filtered.forEach(c => {
                const year = c.competitionYear || '未知年份';
                if (!yearGrouped[year]) yearGrouped[year] = [];
                yearGrouped[year].push(c);
            });

            let html = '';
            Object.keys(yearGrouped).sort((a, b) => b - a).forEach(year => {
                // 每年份内按月份分组
                const monthGrouped = {};
                yearGrouped[year].forEach(c => {
                    let month = '未知月份';
                    if (c.startDate) {
                        const m = new Date(c.startDate).getMonth() + 1;
                        month = m + '月';
                    }
                    if (!monthGrouped[month]) monthGrouped[month] = [];
                    monthGrouped[month].push(c);
                });

                html += `<h4 style="margin: 20px 0 10px; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 5px;">${year}年</h4>`;

                // 月份排序：1-12月在前，未知月份在最后
                const monthKeys = Object.keys(monthGrouped).sort((a, b) => {
                    const ma = parseInt(a);
                    const mb = parseInt(b);
                    if (!isNaN(ma) && !isNaN(mb)) return ma - mb;
                    if (!isNaN(ma)) return -1;
                    if (!isNaN(mb)) return 1;
                    return 0;
                });

                monthKeys.forEach(month => {
                    // 月份内按开始日期升序（最早的在前）
                    monthGrouped[month].sort((a, b) => {
                        const dateA = a.startDate ? new Date(a.startDate).getTime() : 0;
                        const dateB = b.startDate ? new Date(b.startDate).getTime() : 0;
                        return dateA - dateB;
                    });

                    html += `<h5 style="margin: 12px 0 8px; color: #555; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px;">📅 ${month}</h5>`;
                    monthGrouped[month].forEach(c => {
                        html += `
                            <div class="competition-card" onclick="showCompetitionDetail(${c.id})">
                                <div class="competition-info">
                                    <h4>${c.name}</h4>
                                    <p>📍 ${c.location || '-'} | 📅 ${c.startDate && c.endDate ? new Date(c.startDate).toLocaleDateString() + ' - ' + new Date(c.endDate).toLocaleDateString() : c.startDate ? new Date(c.startDate).toLocaleDateString() : '-'}</p>
                                </div>
                                <div>
                                    <button class="btn btn-warning" onclick="event.stopPropagation(); editCompetition(${c.id})">编辑</button>
                                    <button class="btn btn-danger" onclick="event.stopPropagation(); deleteCompetition(${c.id})">删除</button>
                                </div>
                            </div>
                        `;
                    });
                });
            });

            document.getElementById('competitions-list').innerHTML = html || '<div class="empty-state">暂无赛事</div>';
        }

                                if (p1cInput) p1cInput.value = sub.p1Country || '';
                                if (p2Input) p2Input.value = sub.p2 || '';

                        if (p1 > p2) subP1Total++;
                        else if (p2 > p1) subP2Total++;
                    });

                    teamScores.push({
                        p1: p1Name,
                        p1Country: p1Country,
                        p2: p2Name,
                        p2Country: p2Country,
                        scores: subScores,
                        p1Total: subP1Total,
                        p2Total: subP2Total
                    });

                    if (subP1Total > subP2Total) teamP1Total++;
                    else if (subP2Total > subP1Total) teamP2Total++;
                });

                    player1Name: document.getElementById('match-player1').value.trim() || category,

                    const p2 = parseInt(p2Inputs[j].value) || 0;
                    scores.push({ p1, p2 });
                    if (p1 > p2) p1Total++;
                    else if (p2 > p1) p2Total++;
                });

                match = {
                    competitionId: currentCompetitionId,
                    player1Id: player1Id,
                    player1Name: p1Name,
                    player1Country: document.getElementById('match-player1-country').value || '',

        async function loadRankingsByFilter() {
            const year = document.getElementById('ranking-year-select').value;
            const category = document.getElementById('ranking-category-select').value;

            if (!year) {
                document.getElementById('ranking-by-year').innerHTML = '<div class="empty-state">请选择年份</div>';
                return;
            }

            try {
                let url = `${API_BASE}/rankings/year/${year}`;
                if (category) {
                    url = `${API_BASE}/rankings/year/${year}/category/${encodeURIComponent(category)}`;
                }

                const res = await fetch(url);
                const rankings = await res.json();

                rankingPlayerMap = {};
                rankings.forEach(r => {
                    rankingPlayerMap[r.playerName] = r.id;
                });

                // 按项目分组
                const grouped = {};
                rankings.forEach(r => {
                    const cat = r.category || '其他';
                    if (!grouped[cat]) grouped[cat] = [];
                    grouped[cat].push(r);
                });

                // 对每个项目内的排名进行排序
                Object.keys(grouped).forEach(cat => {
                    grouped[cat].sort((a, b) => (a.ranking || 999) - (b.ranking || 999));
                });

                const categories = ['u11男单', 'u11女单', 'u13男单', 'u13女单', 'u15男单', 'u15女单', 'u15男双', 'u15女双', 'u15混双', 'u15男团', 'u15女团', 'u17男单', 'u17女单', 'u17男双', 'u17女双', 'u17混双', 'u19男单', 'u19女单', 'u19男双', 'u19女双', 'u19混双', 'u19男团', 'u19女团', '男单', '女单', '男双', '女双', '混双', '男团', '女团'];
                let html = '';

                categories.forEach(cat => {
                    if (grouped[cat] && grouped[cat].length > 0) {
                        html += `
                            <div style="margin-bottom: 30px;">
                                <h4 style="margin-bottom: 10px; color: #0077b6; font-weight: 700;">${cat}</h4>
                                <table class="ranking-table ranking-table--clean">
                                    <thead>
                                        <tr>
                                            <th>排名</th>
                                            <th>运动员</th>
                                            <th>国家</th>
                                            <th>积分</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${grouped[cat].map((r, i) => `
                                            <tr class="rank-${i + 1}">
                                                <td><span class="rank-num rank-num--${i + 1}">${r.ranking || i + 1}</span></td>
                                                <td>${r.playerName}</td>
                                                <td><span class="player-flag">${getFlag(r.country)}</span>${(r.country || '').includes('/') || (r.country || '').includes('+') || (r.country || '').includes('&') ? '' : (r.country || '-')}</td>
                                                <td class="points">${r.points || 0}</td>
                                                <td>
                                                    <button class="btn btn-warning btn-sm" onclick="editRanking(${r.id})">编辑</button>
                                                    <button class="btn btn-danger btn-sm" onclick="deleteRanking(${r.id})">删除</button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `;
                    }
                });

                document.getElementById('ranking-by-year').innerHTML = html || '<div class="empty-state">该年份暂无排名数据</div>';
            } catch (e) {
                console.error(e);
            }
        }

                allCompetitionsForChampions.sort((a, b) => (b.competitionYear || 0) - (a.competitionYear || 0));

                // 按年份分组

                allCompetitionsForChampions.forEach(c => {
                    const year = c.competitionYear || '未知年份';
                    if (!yearGrouped[year]) yearGrouped[year] = [];
                    yearGrouped[year].push(c);
                });

                let html = '';
                Object.keys(yearGrouped).sort((a, b) => b - a).forEach(year => {
                    // 每年份内按月份分组
                    const monthGrouped = {};
                    yearGrouped[year].forEach(c => {
                        let month = '未知月份';
                        if (c.startDate) {
                            const m = new Date(c.startDate).getMonth() + 1;
                            month = m + '月';
                        }
                        if (!monthGrouped[month]) monthGrouped[month] = [];
                        monthGrouped[month].push(c);
                    });

                    html += `<h4 style="margin: 20px 0 10px; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 5px;">${year}年</h4>`;

                    // 月份排序：1-12月在前，未知月份在最后
                    const monthKeys = Object.keys(monthGrouped).sort((a, b) => {
                        const ma = parseInt(a);
                        const mb = parseInt(b);
                        if (!isNaN(ma) && !isNaN(mb)) return ma - mb;
                        if (!isNaN(ma)) return -1;
                        if (!isNaN(mb)) return 1;
                        return 0;
                    });

                    monthKeys.forEach(month => {
                        // 月份内按开始日期升序（最早的在前）
                        monthGrouped[month].sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

                        html += `<h5 style="margin: 12px 0 8px; color: #555; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px;">📅 ${month}</h5>`;
                        monthGrouped[month].forEach(c => {

                                ? `${new Date(c.startDate).toLocaleDateString()} - ${new Date(c.endDate).toLocaleDateString()}`
                                : c.startDate
                                    ? `${new Date(c.startDate).toLocaleDateString()}`

                                        <p>📅 ${dateRange} | 📍 ${c.location || '-'}</p>
                                    </div>
                                </div>
                            `;
                        });
                    });
                });

                document.getElementById('champions-competitions-list').innerHTML = html || '<div class="empty-state">暂无赛事</div>';
            } catch (e) {

        function getMedalWinnersWithFlags(matches, category) {
            const base = getMedalWinners(matches, category);
            if (!base) return null;
            const matchByName = {};
            matches.forEach(m => {
                if (m.player1Name) matchByName[m.player1Name] = m.player1Country || '';
                if (m.player2Name) matchByName[m.player2Name] = m.player2Country || '';
            });
            const thirdCountries = Array.isArray(base.thirdPlaces)
                ? base.thirdPlaces.map(name => matchByName[name] || '')
                : [(matchByName[base.thirdPlace] || '')];
            return {
                ...base,
                championCountry: matchByName[base.champion] || '',
                runnerUpCountry: matchByName[base.runnerUp] || '',
                thirdCountries: thirdCountries
            };
        }

        function getMedalWinners(matches, category) {
            console.log('=== getMedalWinners called ===');
            console.log('All matches:', matches.map(m => ({ id: m.id, round: m.roundNumber, status: m.status, p1: m.player1Name })));

            // 只处理已完成比赛（兼容多种状态值）
            const completedMatches = matches.filter(m => {
                const status = (m.status || '').toLowerCase();
                return status === 'completed' || status === 'finished' || status === '已完成' || status === '已结束';
            });

            console.log('All matches:', matches.map(m => ({ id: m.id, round: m.roundNumber, status: m.status, p1: m.player1Name })));
            console.log('Completed matches:', completedMatches.map(m => ({ id: m.id, round: m.roundNumber, p1: m.player1Name })));

            if (completedMatches.length === 0) return null;

            // 找决赛（必须包含"决赛"或"Final"，且不是1/Xx决赛格式）
            const allFinals = completedMatches.filter(m => {
                const r = m.roundNumber || '';
                const isFinal = (r.includes('决赛') || r.toLowerCase().includes('final'))
                    && !/1\/\d+决赛/.test(r) && !r.includes('半');
                return isFinal;
            });

            // 按日期排序，取最晚的决赛
            allFinals.sort((a, b) => new Date(b.matchDate || 0) - new Date(a.matchDate || 0));

            const finalMatch = allFinals.length > 0 ? allFinals[0] : null;

            console.log('Final match:', finalMatch ? { id: finalMatch.id, p1: finalMatch.player1Name, p2: finalMatch.player2Name } : 'none');

            // 没有决赛，不显示冠亚季军
            if (!finalMatch) {
                console.log('No final match, returning null');
                return null;
            }

            let champion = null;
            let runnerUp = null;
            let thirdPlace = null;
            let thirdPlaces = [];

            // 计算总分
            let p1Total = finalMatch.player1Total || 0;
            let p2Total = finalMatch.player2Total || 0;

            // 从scores计算
            if ((p1Total === 0 && p2Total === 0) && finalMatch.scores) {
                try {
                    const scores = JSON.parse(finalMatch.scores);
                    scores.forEach(s => {
                        if (s.p1 > s.p2) p1Total++;
                        else if (s.p2 > s.p1) p2Total++;
                    });
                } catch (e) { }
            }

            console.log('Final scores:', p1Total, p2Total);

            if (p1Total > p2Total) {
                champion = finalMatch.player1Name;
                runnerUp = finalMatch.player2Name;
            } else if (p2Total > p1Total) {
                champion = finalMatch.player2Name;
                runnerUp = finalMatch.player1Name;
            } else {
                console.log('Final match is a tie, cannot determine champion');
                return null;
            }

            console.log('Champion:', champion, 'Runner up:', runnerUp);

            // 查找所有半决（用于确定季军）- 支持多种格式
            console.log('===== DEBUG: All completed matches roundNumbers =====');
            completedMatches.forEach(m => {
                console.log(`Match ${m.id}: roundNumber="${m.roundNumber}", p1=${m.player1Name}, p2=${m.player2Name}`);
            });

            const semiFinals = completedMatches.filter(m => {
                const r = m.roundNumber || '';
                const isSemi = r.includes('半') || r.toLowerCase().includes('semi') || r.includes('准决') || r.includes('4强') || r.includes('半决赛') || r.includes('初赛');
                console.log('Checking match for semi:', m.id, m.roundNumber, 'isSemi:', isSemi);
                return isSemi;
            });

            console.log('===== Semi-finals found:', semiFinals.length);
            semiFinals.forEach((semi, i) => {
                console.log(`Semi ${i + 1}:`, { p1: semi.player1Name, p2: semi.player2Name, scores: semi.scores });
            });

            console.log('===== Processing semi-finals for third places =====');

            // 铜牌赛
            const bronzeMatch = completedMatches.find(m => (m.roundNumber || '').includes('铜牌'));

            if (bronzeMatch) {
                let bP1Total = bronzeMatch.player1Total || 0;
                let bP2Total = bronzeMatch.player2Total || 0;

                if ((bP1Total === 0 && bP2Total === 0) && bronzeMatch.scores) {
                    try {
                        const scores = JSON.parse(bronzeMatch.scores);
                        scores.forEach(s => {
                            if (s.p1 > s.p2) bP1Total++;
                            else if (s.p2 > s.p1) bP2Total++;
                        });
                    } catch (e) { }
                }

                if (bP1Total > bP2Total) {
                    thirdPlace = bronzeMatch.player1Name;
                    thirdPlaces = [bronzeMatch.player1Name];
                } else if (bP2Total > bP1Total) {
                    thirdPlace = bronzeMatch.player2Name;
                    thirdPlaces = [bronzeMatch.player2Name];
                }
            } else if (semiFinals.length > 0) {
                console.log('===== Processing', semiFinals.length, 'semifinals for third places');
                // 没有铜牌赛时，使用所有半决输的两队作为季军
                for (const semi of semiFinals) {
                    let sP1Total = 0;
                    let sP2Total = 0;

                    // 从scores计算总分
                    if (semi.scores) {
                        try {
                            const scores = JSON.parse(semi.scores);
                            console.log('Semi scores:', semi.player1Name, 'vs', semi.player2Name, scores);
                            scores.forEach(s => {
                                if (s.p1 > s.p2) sP1Total++;
                                else if (s.p2 > s.p1) sP2Total++;
                            });
                            console.log('Semi totals:', sP1Total, 'vs', sP2Total);
                        } catch (e) { }
                    }

                    console.log('Semi match:', semi.player1Name, sP1Total, 'vs', semi.player2Name, sP2Total);
                    console.log('Winner is:', sP1Total > sP2Total ? semi.player1Name : (sP2Total > sP1Total ? semi.player2Name : 'tie'));

                    console.log('===== DEBUG: Adding third place =====');
                    console.log('Condition 1 (player1 wins): sP1Total=' + sP1Total + ', sP2Total=' + sP2Total + ', result=' + (sP1Total > sP2Total && sP1Total > 0));
                    console.log('Condition 2 (player2 wins): sP2Total=' + sP2Total + ', sP1Total=' + sP1Total + ', result=' + (sP2Total > sP1Total && sP2Total > 0));

                    // 输的一方加入季军列表（忽略0-0的比分）
                    if (sP1Total > sP2Total && sP1Total > 0) {
                        console.log('Adding loser (player2 won):', semi.player2Name);
                        if (!thirdPlaces.includes(semi.player2Name)) {
                            thirdPlaces.push(semi.player2Name);
                            console.log('Added third place:', semi.player2Name);
                        }
                    }
                    if (sP2Total > sP1Total && sP2Total > 0) {
                        console.log('Adding loser (player1 won):', semi.player1Name);
                        if (!thirdPlaces.includes(semi.player1Name)) {
                            thirdPlaces.push(semi.player1Name);
                            console.log('Added third place:', semi.player1Name);
                        }
                    }
                }
            }

            console.log('===== Final thirdPlaces array:', thirdPlaces);

            console.log('Third place:', thirdPlace);
            console.log('Third places (array):', thirdPlaces);

            if (!champion) return null;

            const result = {
                champion: champion || '-',
                runnerUp: runnerUp || '-',
                thirdPlace: thirdPlace || '-',
                thirdPlaces: thirdPlaces.length > 0 ? thirdPlaces : null,
                _debug: {
                    semiFinalsCount: semiFinals.length,
                    semiFinals: semiFinals.map(s => ({ id: s.id, round: s.roundNumber, p1: s.player1Name, p2: s.player2Name })),
                    thirdPlacesRaw: thirdPlaces
                }
            };
            console.log('===== FINAL RESULT:', result);
            return result;
        }

        function getRoundOrder(roundNumber) {
            if (!roundNumber) return 999;
            if (roundNumber.includes('决赛') || roundNumber.includes('Final')) return 1;
            if (roundNumber.includes('半决') || roundNumber.includes('Semi')) return 2;
            if (roundNumber.includes('1/4') || roundNumber.includes('Quarter')) return 3;
            if (roundNumber.includes('1/8')) return 4;
            if (roundNumber.includes('1/16')) return 5;
            if (roundNumber.includes('1/32')) return 6;
            if (roundNumber.includes('1/64')) return 7;
            if (roundNumber.includes('1/128')) return 8;
            return 9;
        }

                                t.style.fontWeight = '400';

                            });

            .then(function(d){

                        html += '<tr><td style="padding:6px 10px;border-bottom:1px solid #f0f0f0;font-weight:600;">'+s.score+'</td>' +
                            '<td style="padding:6px 10px;text-align:center;border-bottom:1px solid #f0f0f0;">'+s.count+'</td></tr>';

        }

        // Close autocomplete dropdown on outside click
        document.addEventListener('click', function(e) {
            var dd = document.getElementById('v-player-dropdown');
            var search = document.getElementById('v-player-search');
            if (dd && search && !search.contains(e.target) && !dd.contains(e.target)) {
                dd.style.display = 'none';
            }
        });

        // 等 DOM 加载完成后再初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadHomeData);
        } else {
            loadHomeData();
        }
    </script>
</body>

</html>
