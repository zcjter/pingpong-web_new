<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏓</text></svg>">
    <title>乒乓球比赛管理系统?v=6</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/players.css">
    <link rel="stylesheet" href="css/competitions.css">
    <link rel="stylesheet" href="css/ranking.css">
    <link rel="stylesheet" href="css/champions.css">
    <link rel="stylesheet" href="css/visualization.css">
</head>

</head>
<body>
    <div class="header">
        <h1>🏓 乒乓球比赛管理系统</h1>
    </div>

    <div class="nav">
        <span class="nav-item active" data-page="home">首页</span>
        <span class="nav-item" data-page="players">著名运动员</span>
        <span class="nav-item" data-page="competitions">赛事管理</span>
        <span class="nav-item" data-page="ranking-manage">排名管理</span>
        <span class="nav-item" data-page="champions">赛事冠军</span>
        <span class="nav-item" data-page="visualization">📊 数据</span>
    </div>

    <div class="container">
        <!-- 首页 -->
    <div class="container" id="container">
        <!-- Pages loaded dynamically by common.js -->
    </div>
    <!-- 运动员模态框 -->
    <div id="player-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="player-modal-title">添加运动员</h3>
                <button class="close-btn" onclick="closeModal('player-modal')">&times;</button>
            </div>
            <form id="player-form">
                <input type="hidden" id="player-id">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="player-name" required>
                </div>
                <div class="form-group">
                    <label>国家</label>
                    <input type="text" id="player-country">
                </div>
                <div class="form-group">
                    <label>年龄</label>
                    <input type="number" id="player-age-input">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="player-gender">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>积分</label>
                    <input type="number" id="player-points" value="0">
                </div>
                <div class="form-group">
                    <label>简介</label>
                    <textarea id="player-intro"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn" onclick="closeModal('player-modal')">取消</button>
            </form>
        </div>
    </div>

    <!-- 赛事模态框 -->
    <div id="competition-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="competition-modal-title">添加赛事</h3>
                <button class="close-btn" onclick="closeModal('competition-modal')">&times;</button>
            </div>
            <form id="competition-form">
                <input type="hidden" id="competition-id">
                <div class="form-group">
                    <label>赛事名称 *</label>
                    <input type="text" id="competition-name" required>
                </div>
                <div class="form-group">
                    <label>年份 *</label>
                    <input type="number" id="competition-year" required value="2024">
                </div>
                <div class="form-group">
                    <label>地点</label>
                    <input type="text" id="competition-location">
                </div>
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="competition-start">
                </div>
                <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="competition-end">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="competition-desc"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn" onclick="closeModal('competition-modal')">取消</button>
            </form>
        </div>
    </div>

    <!-- 比赛模态框 -->
    <div id="match-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="match-modal-title">添加比赛</h3>
                <button class="close-btn" onclick="closeModal('match-modal')">&times;</button>
            </div>
            <form id="match-form">
                <input type="hidden" id="match-id">
                <div class="form-group">
                    <label>选手1 *</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="match-player1" list="player-suggestions" required autocomplete="off"
                            placeholder="输入选手姓名" style="flex:1;">
                        <input type="text" id="match-player1-country" placeholder="国家" style="width:100px;">
                    </div>
                </div>
                <div id="match-regular-score-section">
                <div class="form-group">
                    <label>局数 (5局3胜或7局4胜)</label>
                    <select id="match-games" onchange="renderScoreInputs()">
                        <option value="3">3局2胜</option>
                        <option value="5" selected>5局3胜</option>
                        <option value="7">7局4胜</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>每局比分</label>
                    <div id="score-inputs-container"></div>
                </div>
                </div>
                <div class="form-group">
                    <label>选手2 *</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="match-player2" list="player-suggestions" required autocomplete="off"
                            placeholder="输入选手姓名" style="flex:1;">
                        <input type="text" id="match-player2-country" placeholder="国家" style="width:100px;">
                    </div>
                </div>
                <datalist id="player-suggestions"></datalist>
                <div class="form-group">
                    <label>场馆</label>
                    <input type="text" id="match-venue">
                </div>
                <div class="form-group">
                    <label>比赛日期</label>
                    <input type="datetime-local" id="match-date">
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="match-status">
                        <option value="scheduled">已安排</option>
                        <option value="ongoing">进行中</option>
                        <option value="completed">已完成</option>
                        <option value="cancelled">已取消</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>项目类别</label>
                    <div class="match-category-tabs">
                        <button type="button" class="category-btn" data-cat="u11男单" onclick="selectMatchCategory(this, 'u11男单')">u11男单</button>
                        <button type="button" class="category-btn" data-cat="u11女单" onclick="selectMatchCategory(this, 'u11女单')">u11女单</button>
                        <button type="button" class="category-btn" data-cat="u13男单" onclick="selectMatchCategory(this, 'u13男单')">u13男单</button>
                        <button type="button" class="category-btn" data-cat="u13女单" onclick="selectMatchCategory(this, 'u13女单')">u13女单</button>
                        <button type="button" class="category-btn" data-cat="u15男单" onclick="selectMatchCategory(this, 'u15男单')">u15男单</button>
                        <button type="button" class="category-btn" data-cat="u15女单" onclick="selectMatchCategory(this, 'u15女单')">u15女单</button>
                        <button type="button" class="category-btn" data-cat="u15男双" onclick="selectMatchCategory(this, 'u15男双')">u15男双</button>
                        <button type="button" class="category-btn" data-cat="u15女双" onclick="selectMatchCategory(this, 'u15女双')">u15女双</button>
                        <button type="button" class="category-btn" data-cat="u15混双" onclick="selectMatchCategory(this, 'u15混双')">u15混双</button>
                        <button type="button" class="category-btn" data-cat="u15男团" onclick="selectMatchCategory(this, 'u15男团')">u15男团</button>
                        <button type="button" class="category-btn" data-cat="u15女团" onclick="selectMatchCategory(this, 'u15女团')">u15女团</button>
                        <button type="button" class="category-btn" data-cat="u17男单" onclick="selectMatchCategory(this, 'u17男单')">u17男单</button>
                        <button type="button" class="category-btn" data-cat="u17女单" onclick="selectMatchCategory(this, 'u17女单')">u17女单</button>
                        <button type="button" class="category-btn" data-cat="u17男双" onclick="selectMatchCategory(this, 'u17男双')">u17男双</button>
                        <button type="button" class="category-btn" data-cat="u17女双" onclick="selectMatchCategory(this, 'u17女双')">u17女双</button>
                        <button type="button" class="category-btn" data-cat="u17混双" onclick="selectMatchCategory(this, 'u17混双')">u17混双</button>
                       
                        <button type="button" class="category-btn" data-cat="u19男单" onclick="selectMatchCategory(this, 'u19男单')">u19男单</button>
                        <button type="button" class="category-btn" data-cat="u19女单" onclick="selectMatchCategory(this, 'u19女单')">u19女单</button>
                        <button type="button" class="category-btn" data-cat="u19男双" onclick="selectMatchCategory(this, 'u19男双')">u19男双</button>
                        <button type="button" class="category-btn" data-cat="u19女双" onclick="selectMatchCategory(this, 'u19女双')">u19女双</button>
                        <button type="button" class="category-btn" data-cat="u19混双" onclick="selectMatchCategory(this, 'u19混双')">u19混双</button>
                        <button type="button" class="category-btn" data-cat="u19男团" onclick="selectMatchCategory(this, 'u19男团')">u19男团</button>
                        <button type="button" class="category-btn" data-cat="u19女团" onclick="selectMatchCategory(this, 'u19女团')">u19女团</button>
                        <button type="button" class="category-btn" data-cat="男单" onclick="selectMatchCategory(this, '男单')">男单</button>
                        <button type="button" class="category-btn" data-cat="女单" onclick="selectMatchCategory(this, '女单')">女单</button>
                        <button type="button" class="category-btn" data-cat="男双" onclick="selectMatchCategory(this, '男双')">男双</button>
                        <button type="button" class="category-btn" data-cat="女双" onclick="selectMatchCategory(this, '女双')">女双</button>
                        <button type="button" class="category-btn" data-cat="混双" onclick="selectMatchCategory(this, '混双')">混双</button>
                        <button type="button" class="category-btn" data-cat="男团" onclick="selectMatchCategory(this, '男团')">男团</button>
                        <button type="button" class="category-btn" data-cat="女团" onclick="selectMatchCategory(this, '女团')">女团</button>
                    </div>
                    <input type="hidden" id="match-category" value="男单">
                </div>
                <div id="team-match-section" style="display:none;">
                    <div class="form-group">
                        <label>团体赛场次数</label>
                        <select id="team-match-count" onchange="renderTeamSubMatches()">
                            <option value="3">3场2胜</option>
                            <option value="5" selected>5场3胜</option>
                        </select>
                    </div>
                    <div id="team-sub-matches-container"></div>
                </div>
                <div class="form-group">
                    <label>轮次</label>
                    <input type="text" id="match-round" placeholder="如: 1/4决赛、半决赛、决赛">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="match-remark"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn" onclick="closeModal('match-modal')">取消</button>
            </form>
        </div>
    </div>

    <!-- 公告模态框 -->
    <div id="announcement-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="announcement-modal-title">添加公告</h3>
                <button class="close-btn" onclick="closeModal('announcement-modal')">&times;</button>
            </div>
            <form id="announcement-form">
                <input type="hidden" id="announcement-id">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="announcement-title" required>
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="announcement-type">
                        <option value="news">新闻</option>
                        <option value="notice">通知</option>
                        <option value="system">系统</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>内容 *</label>
                    <textarea id="announcement-content" rows="6" required></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="announcement-published" checked> 发布
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn" onclick="closeModal('announcement-modal')">取消</button>
            </form>
        </div>
    </div>

    <!-- 排名模态框 -->
    <div id="ranking-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="ranking-modal-title">添加排名</h3>
                <button class="close-btn" onclick="closeModal('ranking-modal')">&times;</button>
            </div>
            <form id="ranking-form">
                <input type="hidden" id="ranking-id">
                <div class="form-group">
                    <label>年份 *</label>
                    <input type="number" id="ranking-year" required value="2024">
                </div>
                <div class="form-group">
                    <label>项目 *</label>
                    <select id="ranking-category" required>
                        <option value="u11男单">u11男单</option>
                        <option value="u11女单">u11女单</option>
                        <option value="u13男单">u13男单</option>
                        <option value="u13女单">u13女单</option>
                        <option value="u15男单">u15男单</option>
                        <option value="u15女单">u15女单</option>
                        <option value="u15男双">u15男双</option>
                        <option value="u15女双">u15女双</option>
                        <option value="u15混双">u15混双</option>
                        <option value="u15男团">u15男团</option>
                        <option value="u15女团">u15女团</option>
                        <option value="u17男单">u17男单</option>
                        <option value="u17女单">u17女单</option>
                        <option value="u17男双">u17男双</option>
                        <option value="u17女双">u17女双</option>
                        <option value="u17混双">u17混双</option>

                        <option value="u19男单">u19男单</option>
                        <option value="u19女单">u19女单</option>
                        <option value="u19男双">u19男双</option>
                        <option value="u19女双">u19女双</option>
                        <option value="u19混双">u19混双</option>
                        <option value="u19男团">u19男团</option>
                        <option value="u19女团">u19女团</option>
                        <option value="男单">男单</option>
                        <option value="女单">女单</option>
                        <option value="男双">男双</option>
                        <option value="女双">女双</option>
                        <option value="混双">混双</option>
                        <option value="男团">男团</option>
                        <option value="女团">女团</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>排名 *</label>
                    <input type="number" id="ranking-num" required value="1" min="1">
                </div>
                <div class="form-group">
                    <label>运动员 *</label>
                    <input type="text" id="ranking-player-name" required autocomplete="off" placeholder="输入选手姓名">
                </div>
                <div class="form-group">
                    <label>国家</label>
                    <input type="text" id="ranking-country">
                </div>
                <div class="form-group">
                    <label>积分 *</label>
                    <input type="number" id="ranking-points" required value="0">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <button type="button" class="btn" onclick="closeModal('ranking-modal')">取消</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/home.js"></script>
    <script src="js/players.js"></script>
    <script src="js/competitions.js"></script>
    <script src="js/ranking.js"></script>
    <script src="js/champions.js"></script>
    <script src="js/visualization.js"></script>
    </script>
</body>

</html>
